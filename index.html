<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHAT LA PREMIUM COFFEE - POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfcfc; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #f97316 !important; border-bottom: 3px solid #f97316; }
        .item-card:active { transform: scale(0.95); background: #fff7ed; }
        #qrModal, #billModal { transition: opacity 0.3s ease; z-index: 200; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <script>
        const GOOGLE_SHEET_URL = "DÁN_LINK_CỦA_PHÁT_VÀO_ĐÂY";
        const BANK_ID = "VCB"; 
        const ACCOUNT_NO = "1046778674";
    </script>

    <header class="bg-white px-5 py-3 flex justify-between items-center border-b shrink-0 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white font-bold text-[10px]">PL</div>
            <h1 class="text-xs font-black uppercase tracking-tighter">Phát La Coffee</h1>
        </div>
        <div id="clock" class="text-[9px] font-bold text-gray-300"></div>
    </header>

    <nav class="bg-white flex border-b shrink-0">
        <button onclick="showTab('tables')" id="btn-tables" class="flex-1 py-4 text-[10px] font-bold uppercase active-tab">Sơ đồ bàn</button>
        <button onclick="showTab('pos')" id="btn-pos" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">Gọi món</button>
        <button onclick="showTab('report')" id="btn-report" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">Thống kê</button>
    </nav>

    <main class="flex-1 relative overflow-hidden">
        <section id="tab-tables" class="absolute inset-0 p-4 overflow-y-auto">
            <button onclick="selectTakeaway()" class="w-full mb-4 py-4 bg-orange-500 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg">ĐƠN MANG VỀ</button>
            <div class="grid grid-cols-3 gap-3" id="tableGrid"></div>
        </section>

        <section id="tab-pos" class="absolute inset-0 flex flex-col hidden bg-gray-50/50">
            <div class="p-2 flex gap-2 overflow-x-auto no-scrollbar" id="catBar"></div>
            <div class="flex-1 overflow-y-auto p-2"><div class="grid grid-cols-2 gap-2" id="menuGrid"></div></div>
            
            <div class="bg-white p-4 border-t shadow-[0_-10px_30px_rgba(0,0,0,0.05)] shrink-0 space-y-3">
                <div class="flex justify-between items-center px-1">
                    <span id="labelTable" class="text-[9px] font-bold bg-black text-white px-2 py-1 rounded">BÀN</span>
                    <span id="cartTotal" class="text-xl font-bold text-orange-600">0đ</span>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="alert('Đã gửi đơn xuống pha chế!')" class="py-3 bg-blue-500 text-white rounded-xl font-bold text-[9px] uppercase"><i class="fa-solid fa-mug-hot mr-1"></i> Báo pha chế</button>
                    <button onclick="showBill()" class="py-3 bg-gray-800 text-white rounded-xl font-bold text-[9px] uppercase"><i class="fa-solid fa-print mr-1"></i> In Bill</button>
                </div>
                
                <div class="grid grid-cols-2 gap-2 border-t pt-3">
                    <button onclick="processPayment('Tiền mặt')" class="py-4 bg-gray-100 text-gray-700 rounded-xl font-bold text-[10px] uppercase">Tiền mặt</button>
                    <button onclick="generateQR()" class="py-4 bg-orange-500 text-white rounded-xl font-bold text-[10px] uppercase shadow-md">Chuyển khoản QR</button>
                </div>
            </div>
        </section>

        <section id="tab-report" class="absolute inset-0 p-6 hidden bg-white overflow-y-auto">
            <div id="statToday" class="text-3xl font-black text-center mb-8">0đ</div>
            <div id="orderHistory" class="space-y-2 text-[9px]"></div>
        </section>
    </main>

    <div id="billModal" class="fixed inset-0 bg-black/80 flex items-end sm:items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-sm rounded-t-[30px] sm:rounded-[30px] p-6 space-y-4">
            <div class="text-center border-b pb-4">
                <h3 class="font-black uppercase text-sm">Urban Coffee Bill</h3>
                <p id="billTableInfo" class="text-[10px] text-gray-400 uppercase mt-1"></p>
            </div>
            <div id="billItems" class="space-y-2 text-[11px] py-4 max-h-60 overflow-y-auto"></div>
            <div class="border-t pt-4 flex justify-between font-black">
                <span>TỔNG TIỀN:</span>
                <span id="billTotalFinal" class="text-orange-500">0đ</span>
            </div>
            <button onclick="closeBill()" class="w-full py-4 bg-black text-white rounded-xl font-bold text-[10px] uppercase">Đóng</button>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-6 text-center space-y-4">
            <img id="qrImage" src="" class="w-64 h-64 mx-auto border rounded-2xl">
            <div class="py-2">
                <p id="qrAmount" class="text-xl font-black text-orange-500">0đ</p>
                <p class="text-[9px] text-gray-400">Vietcombank - 1046778674</p>
            </div>
            <button onclick="processPayment('Chuyển khoản')" class="w-full py-4 bg-green-600 text-white rounded-xl font-bold text-[10px] uppercase">Đã nhận tiền</button>
            <button onclick="closeQR()" class="w-full py-2 text-gray-300 text-[9px] uppercase font-bold">Quay lại</button>
        </div>
    </div>

    <script>
        const menu = [
            { cat: "CÀ PHÊ", name: "Espresso", price: 45000, icon: "fa-mug-hot" },
            { cat: "CÀ PHÊ", name: "Americano", price: 50000, icon: "fa-mug-hot" },
            { cat: "TRÀ", name: "Trà Đào", price: 50000, icon: "fa-leaf" },
            { cat: "SIGNATURE", name: "Affogato", price: 80000, icon: "fa-star" }
        ];

        let tables = JSON.parse(localStorage.getItem('pl_v23_tables')) || Array.from({length: 12}, (_, i) => ({ id: i+1, status: 'available', cart: [] }));
        let orders = JSON.parse(localStorage.getItem('pl_v23_orders')) || [];
        let curTable = null, activeCart = [], isTakeaway = false, curCat = "TẤT CẢ";

        function showTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active-tab');
            if(t==='tables') renderTables();
            if(t==='report') renderStats();
        }

        function renderTables() {
            document.getElementById('tableGrid').innerHTML = tables.map(t => `<div onclick="selectTable(${t.id})" class="p-4 rounded-2xl border text-center ${t.status==='available'?'bg-white':'bg-black text-white'}"><b class="text-[10px]">BÀN ${t.id}</b></div>`).join('');
        }

        function selectTable(id) {
            curTable = id; isTakeaway = false;
            document.getElementById('labelTable').innerText = `BÀN ${id}`;
            activeCart = [...tables.find(t => t.id === id).cart];
            updateCartUI(); showTab('pos');
        }

        function selectTakeaway() {
            curTable = null; isTakeaway = true; activeCart = [];
            document.getElementById('labelTable').innerText = `MANG VỀ`;
            updateCartUI(); showTab('pos');
        }

        function renderCats() {
            const cats = ["TẤT CẢ", ...new Set(menu.map(m => m.cat))];
            document.getElementById('catBar').innerHTML = cats.map(c => `<button onclick="setCat('${c}')" class="px-4 py-2 rounded-lg border text-[9px] font-bold shrink-0 ${curCat===c?'bg-black text-white':'bg-white text-gray-400'}">${c}</button>`).join('');
        }

        function setCat(c) { curCat = c; renderCats(); renderMenu(); }

        function renderMenu() {
            const list = curCat === "TẤT CẢ" ? menu : menu.filter(m => m.cat === curCat);
            document.getElementById('menuGrid').innerHTML = list.map(m => `<div onclick="addToCart('${m.name}', ${m.price})" class="item-card bg-white p-3 rounded-xl border h-24 flex flex-col justify-between shadow-sm"><i class="fa-solid ${m.icon} text-orange-500 text-[10px]"></i><p class="text-[9px] font-bold uppercase leading-tight">${m.name}</p><p class="text-[10px] font-bold text-gray-300">${m.price.toLocaleString()}đ</p></div>`).join('');
        }

        function addToCart(name, price) {
            activeCart.push({name, price}); updateCartUI();
            if(!isTakeaway) {
                const t = tables.find(x => x.id === curTable);
                t.status = 'occupied'; t.cart = activeCart;
                localStorage.setItem('pl_v23_tables', JSON.stringify(tables));
            }
        }

        function updateCartUI() {
            let total = activeCart.reduce((s,c)=>s+c.price, 0);
            document.getElementById('cartTotal').innerText = total.toLocaleString() + 'đ';
        }

        // CHỨC NĂNG IN BILL TẠM TÍNH
        function showBill() {
            if(!activeCart.length) return;
            document.getElementById('billTableInfo').innerText = isTakeaway ? 'Đơn mang về' : `Hóa đơn Bàn ${curTable}`;
            document.getElementById('billItems').innerHTML = activeCart.map(c => `<div class="flex justify-between"><span>${c.name}</span><b>${c.price.toLocaleString()}</b></div>`).join('');
            document.getElementById('billTotalFinal').innerText = activeCart.reduce((s,c)=>s+c.price, 0).toLocaleString() + 'đ';
            document.getElementById('billModal').classList.remove('hidden');
        }
        function closeBill() { document.getElementById('billModal').classList.add('hidden'); }

        // CHỨC NĂNG QR
        function generateQR() {
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            if(total <= 0) return;
            const desc = encodeURIComponent(`Urban Coffee Ban ${curTable || 'Mang ve'}`);
            document.getElementById('qrImage').src = `https://img.vietqr.io/image/${BANK_ID}-${ACCOUNT_NO}-compact2.png?amount=${total}&addInfo=${desc}`;
            document.getElementById('qrAmount').innerText = total.toLocaleString() + 'đ';
            document.getElementById('qrModal').classList.remove('hidden');
        }
        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }

        async function processPayment(method) {
            if(!activeCart.length) return;
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            const data = { date: new Date().toLocaleDateString('vi-VN'), time: new Date().toLocaleTimeString('vi-VN'), table: isTakeaway ? 'Mang về' : `Bàn ${curTable}`, total: total, method: method };

            try {
                if(GOOGLE_SHEET_URL.startsWith("http")) await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                orders.unshift(data);
                localStorage.setItem('pl_v23_orders', JSON.stringify(orders));
                if(!isTakeaway) {
                    const t = tables.find(x => x.id === curTable);
                    t.status = 'available'; t.cart = [];
                    localStorage.setItem('pl_v23_tables', JSON.stringify(tables));
                }
                closeQR(); activeCart = []; updateCartUI(); showTab('tables');
            } catch (e) { alert("Lỗi lưu dữ liệu."); }
        }

        function renderStats() {
            const today = new Date().toLocaleDateString('vi-VN');
            document.getElementById('statToday').innerText = orders.filter(o => o.date === today).reduce((s,o)=>s+o.total, 0).toLocaleString() + 'đ';
            document.getElementById('orderHistory').innerHTML = orders.slice(0, 10).map(o => `<div class="flex justify-between p-2 border-b"><span>${o.time} (${o.table})</span><b>+${o.total.toLocaleString()}</b></div>`).join('');
        }

        window.onload = () => { renderCats(); renderMenu(); showTab('tables'); };
    </script>
</body>
</html>
