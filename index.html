<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URBAN COFFEE - AUTO SYNC V24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfcfc; }
        .active-tab { color: #f97316 !important; border-bottom: 3px solid #f97316; }
        #qrModal, #billModal { transition: opacity 0.3s ease; z-index: 200; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <script>
        // PHÁT DÁN LINK APPS SCRIPT VỪA COPY Ở BƯỚC 1 VÀO ĐÂY
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzxa0i0tb_hhjLfRZj4zWKEm97RIK6ehx0Umn6k9XPBfPfstomEFCl9ItctKeuzM8Gr/exec";
        
        const BANK_ID = "VCB"; 
        const ACCOUNT_NO = "1046778674";
    </script>

    <header class="bg-white px-5 py-3 flex justify-between items-center border-b shrink-0 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white font-bold text-[10px]">PL</div>
            <h1 class="text-xs font-black uppercase tracking-tighter text-orange-500">Phát La Coffee</h1>
        </div>
        <div id="syncStatus" class="text-[8px] font-bold text-green-500 uppercase flex items-center gap-1">
            <i class="fa-solid fa-circle-check"></i> Đã kết nối Sheet
        </div>
    </header>

    <nav class="bg-white flex border-b shrink-0">
        <button onclick="showTab('tables')" id="btn-tables" class="flex-1 py-4 text-[10px] font-bold uppercase active-tab">Sơ đồ bàn</button>
        <button onclick="showTab('pos')" id="btn-pos" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">Gọi món</button>
    </nav>

    <main class="flex-1 relative overflow-hidden">
        <section id="tab-tables" class="absolute inset-0 p-4 overflow-y-auto">
            <button onclick="selectTakeaway()" class="w-full mb-4 py-4 bg-orange-500 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg">ĐƠN MANG VỀ</button>
            <div class="grid grid-cols-3 gap-3" id="tableGrid"></div>
        </section>

        <section id="tab-pos" class="absolute inset-0 flex flex-col hidden bg-gray-50/50">
            <div id="menuGrid" class="flex-1 overflow-y-auto p-2 grid grid-cols-2 gap-2"></div>
            
            <div class="bg-white p-4 border-t shadow-lg space-y-3">
                <div class="flex justify-between items-center">
                    <span id="labelTable" class="text-[9px] font-bold bg-black text-white px-2 py-1 rounded tracking-widest uppercase">BÀN</span>
                    <span id="cartTotal" class="text-xl font-black text-orange-600 tracking-tighter">0đ</span>
                </div>

                <div class="grid grid-cols-2 gap-2 border-t pt-3">
                    <button id="btnCash" onclick="processPayment('Tiền mặt')" class="py-4 bg-gray-100 text-gray-700 rounded-xl font-bold text-[10px] uppercase">Tiền mặt</button>
                    <button id="btnQR" onclick="generateQR()" class="py-4 bg-orange-500 text-white rounded-xl font-bold text-[10px] uppercase shadow-md active:scale-95 transition-all">Quét mã QR</button>
                </div>
            </div>
        </section>
    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 text-center space-y-5">
            <p class="text-[9px] font-bold uppercase tracking-widest text-gray-400">Thanh toán chuyển khoản</p>
            <img id="qrImage" src="" class="w-64 h-64 mx-auto border-4 border-gray-50 rounded-3xl">
            <p id="qrAmount" class="text-2xl font-black text-orange-500 tracking-tighter">0đ</p>
            <button onclick="processPayment('Chuyển khoản')" class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg">Xác nhận đã nhận tiền</button>
            <button onclick="closeQR()" class="w-full py-2 text-gray-300 text-[9px] uppercase font-bold tracking-widest">Hủy lệnh</button>
        </div>
    </div>

    <script>
        const menu = [
            { name: "Espresso", price: 45000, icon: "fa-mug-hot" },
            { name: "Americano", price: 50000, icon: "fa-mug-hot" },
            { name: "Trà Đào", price: 50000, icon: "fa-leaf" },
            { name: "Cà Phê Sữa Đá", price: 45000, icon: "fa-glass-water" }
        ];

        let tables = JSON.parse(localStorage.getItem('pl_v24_tables')) || Array.from({length: 12}, (_, i) => ({ id: i+1, status: 'available', cart: [] }));
        let curTable = null, activeCart = [], isTakeaway = false;

        function showTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active-tab');
            if(t==='tables') renderTables();
        }

        function renderTables() {
            document.getElementById('tableGrid').innerHTML = tables.map(t => `<div onclick="selectTable(${t.id})" class="p-4 rounded-2xl border text-center transition-all ${t.status==='available'?'bg-white':'bg-black text-white'}"><b class="text-[10px]">BÀN ${t.id}</b></div>`).join('');
        }

        function selectTable(id) {
            curTable = id; isTakeaway = false;
            document.getElementById('labelTable').innerText = `BÀN ${id}`;
            activeCart = [...tables.find(t => t.id === id).cart];
            updateCartUI(); showTab('pos');
        }

        function selectTakeaway() {
            curTable = null; isTakeaway = true; activeCart = [];
            document.getElementById('labelTable').innerText = `MANG VỀ`;
            updateCartUI(); showTab('pos');
        }

        function renderMenu() {
            document.getElementById('menuGrid').innerHTML = menu.map(m => `<div onclick="addToCart('${m.name}', ${m.price})" class="bg-white p-4 rounded-2xl border flex flex-col justify-between h-28 shadow-sm active:scale-95 transition-all"><i class="fa-solid ${m.icon} text-orange-500 text-xs"></i><p class="text-[10px] font-bold uppercase leading-tight">${m.name}</p><p class="text-[10px] font-bold text-gray-300">${m.price.toLocaleString()}đ</p></div>`).join('');
        }

        function addToCart(name, price) {
            activeCart.push({name, price}); updateCartUI();
            if(!isTakeaway) {
                const t = tables.find(x => x.id === curTable);
                t.status = 'occupied'; t.cart = activeCart;
                localStorage.setItem('pl_v24_tables', JSON.stringify(tables));
            }
        }

        function updateCartUI() {
            let total = activeCart.reduce((s,c)=>s+c.price, 0);
            document.getElementById('cartTotal').innerText = total.toLocaleString() + 'đ';
        }

        function generateQR() {
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            if(total <= 0) return;
            const desc = encodeURIComponent(`URBAN COFFEE B${curTable || 'MV'}`);
            document.getElementById('qrImage').src = `https://img.vietqr.io/image/${BANK_ID}-${ACCOUNT_NO}-compact2.png?amount=${total}&addInfo=${desc}`;
            document.getElementById('qrAmount').innerText = total.toLocaleString() + 'đ';
            document.getElementById('qrModal').classList.remove('hidden');
        }

        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }

        async function processPayment(method) {
            if(!activeCart.length) return;
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            const data = { 
                date: new Date().toLocaleDateString('vi-VN'), 
                time: new Date().toLocaleTimeString('vi-VN'), 
                table: isTakeaway ? 'Mang về' : `Bàn ${curTable}`, 
                total: total, 
                method: method 
            };

            const statusEl = document.getElementById('syncStatus');
            statusEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xuất dữ liệu...';

            try {
                // ĐẨY DỮ LIỆU SANG GOOGLE SHEET
                await fetch(GOOGLE_SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(data)
                });

                if(!isTakeaway) {
                    const t = tables.find(x => x.id === curTable);
                    t.status = 'available'; t.cart = [];
                    localStorage.setItem('pl_v24_tables', JSON.stringify(tables));
                }
                
                statusEl.innerHTML = '<i class="fa-solid fa-circle-check"></i> Đã đồng bộ Sheet';
                closeQR(); activeCart = []; updateCartUI(); showTab('tables');
                alert("Thanh toán xong! Dữ liệu đã xuất ra Trang tính.");
            } catch (e) {
                alert("Lỗi kết nối Sheet!");
                statusEl.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i> Lỗi đồng bộ';
            }
        }

        window.onload = () => { renderMenu(); showTab('tables'); };
    </script>
</body>
</html>
