    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        
        :root { --primary: #f97316; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .fade-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        #toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: white; padding: 16px 24px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-left: 6px solid; }
        .toast.show { transform: translateX(0); }
        .toast.error { border-color: #ef4444; }
        .toast.success { border-color: #22c55e; }
        .toast.warning { border-color: #f59e0b; }

        .table-card { transition: all 0.25s ease; border-radius: 2rem; position: relative; overflow: hidden; }
        .table-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%); opacity: 0; transition: opacity 0.3s; }
        .table-card:hover::before { opacity: 1; }
        .table-card.available { background: white; border: 2px solid #e2e8f0; }
        .table-card.occupied { background: var(--primary); color: white; transform: translateY(-4px); box-shadow: 0 15px 30px -10px rgba(249, 115, 22, 0.4); border: 2px solid var(--primary); }
        
        .item-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 1.5rem; border: 1px solid #e2e8f0; background: white; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; height: 140px; padding: 1.25rem; }
        .item-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .item-card:active { transform: scale(0.96); }

        .active-nav { border-bottom: 4px solid var(--primary); color: var(--dark) !important; font-weight: 900; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .thin-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .thin-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* HỆ THỐNG IN ẤN */
        #print-area { display: none; }
        @media print {
            body > *:not(#print-area) { display: none !important; }
            @page { margin: 0; size: 80mm auto; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 80mm; padding: 10px; margin: 0 auto; color: black; font-family: monospace; background: white; }
            body { background-color: white !important; }
            .print-line { border-top: 1px dashed black; margin: 8px 0; }
            .print-text-center { text-align: center; }
            .print-text-right { text-align: right; }
        }
    </style>
</head>

    <script>
        // ==========================================
        // KHỐI 1: TÍCH HỢP FIREBASE (REALTIME)
        // ==========================================
        function initRealtimeSync() {
            if(!window.FIREBASE_DB) return;
            const { ref, onValue } = window.firebaseRefs;
            
            onValue(ref(window.FIREBASE_DB, 'pos/tables'), (snapshot) => {
                document.getElementById('sync-dot').className = "w-2 h-2 rounded-full bg-green-500 animate-pulse";
                document.getElementById('system-status').innerText = "Đã kết nối máy chủ";
                const data = snapshot.val();
                if(data) {
                    appState.tables = data;
                    if(appState.activeTab === 'tables') renderTableGrid();
                    if(appState.activeTab === 'pos') renderCartUI();
                }
            });

            onValue(ref(window.FIREBASE_DB, 'pos/transactions'), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    appState.transactions = Object.values(data);
                    if(appState.activeTab === 'report') renderReportUI();
                }
            });
        }

        function syncStateToCloud() {
            if(window.FIREBASE_DB) {
                const { set, ref } = window.firebaseRefs;
                set(ref(window.FIREBASE_DB, 'pos/tables'), appState.tables);
            } else { renderTableGrid(); renderCartUI(); }
        }

        // ==========================================
        // KHỐI 2: UI & LOGIC CƠ BẢN
        // ==========================================
        function initializeSystemData() {
            document.getElementById('ui-bank-info').innerText = `${SYSTEM_CONFIG.bank} - ${SYSTEM_CONFIG.accountNo}`;
            document.getElementById('ui-account-name').innerText = SYSTEM_CONFIG.accountName;
            document.getElementById('print-shop-name').innerText = SYSTEM_CONFIG.shopName;
            document.getElementById('print-shop-address').innerText = SYSTEM_CONFIG.address;
        }

        function showNotification(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'error' ? '<i class="fa-solid fa-circle-exclamation text-red-500"></i>' : (type === 'warning' ? '<i class="fa-solid fa-triangle-exclamation text-yellow-500"></i>' : '<i class="fa-solid fa-circle-check text-green-500"></i>');
            toast.innerHTML = `${icon} <span class="text-[10px] lg:text-[11px] font-bold text-gray-800">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        function switchTab(targetId) {
            ['view-tables', 'view-pos', 'view-report'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('block', 'flex', 'fade-in');
            });
            document.querySelectorAll('nav button').forEach(b => { b.classList.remove('active-nav'); b.classList.add('text-slate-400'); });

            const targetEl = document.getElementById(`view-${targetId}`);
            targetEl.classList.remove('hidden'); targetEl.classList.add('block', 'fade-in');
            
            document.getElementById(`nav-${targetId}`).classList.add('active-nav');
            document.getElementById(`nav-${targetId}`).classList.remove('text-slate-400');

            appState.activeTab = targetId;
            if (targetId === 'tables') renderTableGrid();
            if (targetId === 'pos') { renderCategories(); renderMenuItems(); renderCartUI(); }
            if (targetId === 'report') renderReportUI();
        }

        function renderTableGrid() {
            const grid = document.getElementById('grid-tables');
            let occ = 0;
            grid.innerHTML = appState.tables.map(t => {
                if (t.status === 'occupied') occ++;
                const displayId = t.id < 10 ? `0${t.id}` : t.id;
                return `
                    <div onclick="handleSelectTable(${t.id})" class="table-card ${t.status} p-5 lg:p-8 flex flex-col items-center justify-center cursor-pointer shadow-sm">
                        <span class="text-[8px] lg:text-[9px] font-black uppercase mb-1 lg:mb-2 ${t.status === 'occupied' ? 'opacity-50 text-white' : 'opacity-40 text-slate-500'}">BÀN</span>
                        <b class="text-3xl lg:text-4xl font-black">${displayId}</b>
                        <div class="h-4 mt-1 lg:mt-2">${t.status === 'occupied' && t.startTime ? `<span class="text-[8px] lg:text-[9px] font-bold uppercase bg-white/20 px-2 py-0.5 rounded text-white">${t.startTime}</span>` : ''}</div>
                    </div>`;
            }).join('');
            document.getElementById('table-stats').innerText = `${occ}/${SYSTEM_CONFIG.totalTables} Bàn phục vụ`;
        }

        function handleSelectTable(id) {
            const table = appState.tables.find(t => t.id === id);
            appState.currentTableId = id;
            if (table.status === 'available' || !table.startTime) {
                table.startTime = new Date().toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
            }
            document.getElementById('bill-table-name').innerText = `BÀN ${id < 10 ? '0'+id : id}`;
            document.getElementById('bill-time-in').innerText = `Giờ vào: ${table.startTime}`;
            syncStateToCloud();
            switchTab('pos');
        }

        function renderCategories() {
            const cats = ["TẤT CẢ", ...new Set(FULL_MENU.map(m => m.cat))];
            document.getElementById('sidebar-categories').innerHTML = cats.map(c => `
                <button onclick="appState.filterCategory='${c}'; renderMenuItems()" class="px-4 lg:px-5 py-3 lg:py-4 rounded-xl lg:rounded-2xl text-[9px] lg:text-[10px] font-black uppercase transition-all shrink-0 text-center lg:text-left border ${appState.filterCategory === c ? 'bg-gray-900 text-white border-gray-900 shadow-md' : 'bg-white text-slate-500 border-slate-200'} whitespace-nowrap">${c}</button>
            `).join('');
        }

        function renderMenuItems() {
            const items = appState.filterCategory === "TẤT CẢ" ? FULL_MENU : FULL_MENU.filter(m => m.cat === appState.filterCategory);
            document.getElementById('grid-menu').innerHTML = items.map(m => `
                <div onclick="handleAddToCart('${m.id}')" class="item-card">
                    <div class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl lg:rounded-2xl bg-orange-50 text-orange-600 flex items-center justify-center text-lg lg:text-xl mb-2 lg:mb-4"><i class="fa-solid ${m.icon}"></i></div>
                    <div><p class="text-[9px] lg:text-[11px] font-black uppercase text-slate-800 mb-0.5 lg:mb-1 line-clamp-2">${m.name}</p><p class="text-[10px] lg:text-[12px] font-bold text-orange-600">${m.price.toLocaleString()}đ</p></div>
                </div>
            `).join('');
        }

        function handleAddToCart(productId) {
            if (!appState.currentTableId) return showNotification("Chọn bàn trước!", "error");
            const product = FULL_MENU.find(p => p.id === productId);
            const table = appState.tables.find(t => t.id === appState.currentTableId);
            if(!table.cart) table.cart = [];
            table.status = 'occupied';
            table.cart.push({...product, tempId: Date.now().toString()});
            syncStateToCloud();
        }

        function handleRemoveFromCart(tempId) {
            const table = appState.tables.find(t => t.id === appState.currentTableId);
            table.cart = table.cart.filter(x => x.tempId !== tempId);
            if (table.cart.length === 0) { table.status = 'available'; table.startTime = null; }
            syncStateToCloud();
        }

        function renderCartUI() {
            const container = document.getElementById('bill-items');
            const totalEl = document.getElementById('bill-total-price');
            if (!appState.currentTableId || !appState.tables.find(t => t.id === appState.currentTableId).cart?.length) { 
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center opacity-30 text-slate-400"><i class="fa-solid fa-basket-shopping text-3xl lg:text-5xl mb-2 lg:mb-4"></i><p class="text-[9px] lg:text-[10px] font-black uppercase">Chưa có món</p></div>`; 
                totalEl.innerText = "0đ"; 
                return; 
            }
            
            const table = appState.tables.find(t => t.id === appState.currentTableId);
            container.innerHTML = table.cart.map(x => `
                <div class="flex justify-between items-center p-3 lg:p-4 bg-white rounded-xl lg:rounded-2xl border border-slate-100 shadow-sm fade-in">
                    <div class="flex items-center gap-2 lg:gap-3"><div class="w-6 h-6 lg:w-8 lg:h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 text-[10px] lg:text-xs"><i class="fa-solid ${x.icon}"></i></div><span class="text-[9px] lg:text-[10px] font-black uppercase text-gray-800 max-w-[100px] lg:max-w-[150px] truncate">${x.name}</span></div>
                    <div class="flex items-center gap-2 lg:gap-3"><span class="text-[10px] lg:text-[11px] font-bold text-orange-600">${x.price.toLocaleString()}</span><button onclick="handleRemoveFromCart('${x.tempId}')" class="text-red-400 hover:text-red-600 w-6 h-6 flex items-center justify-center bg-red-50 rounded-full"><i class="fa-solid fa-xmark text-[10px]"></i></button></div>
                </div>
            `).join('');
            totalEl.innerText = table.cart.reduce((s, i) => s + i.price, 0).toLocaleString() + 'đ';
        }

        // ==========================================
        // KHỐI 3: THANH TOÁN & IN ẤN
        // ==========================================
        function triggerPaymentFlow() {
            if (!appState.currentTableId) return;
            const table = appState.tables.find(t => t.id === appState.currentTableId);
            if (!table.cart || table.cart.length === 0) return showNotification("Bàn chưa có món!", "warning");
            
            document.getElementById('checkout-table-label').innerText = table.id;
            document.getElementById('checkout-amount').innerText = table.cart.reduce((s, i) => s + i.price, 0).toLocaleString() + 'đ';
            const modal = document.getElementById('modal-checkout'), content = document.getElementById('modal-checkout-content');
            modal.classList.remove('hidden');
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
            selectPaymentMethod('Tiền mặt'); 
        }

        function closeModal() {
            const content = document.getElementById('modal-checkout-content');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => document.getElementById('modal-checkout').classList.add('hidden'), 300);
        }

        function selectPaymentMethod(method) {
            appState.paymentMethod = method;
            const btnCash = document.getElementById('btn-pay-cash'), btnQr = document.getElementById('btn-pay-qr'), qrBox = document.getElementById('checkout-qr-box');
            if (method === 'Tiền mặt') {
                btnCash.className = "p-4 lg:p-6 border-2 rounded-2xl lg:rounded-[2rem] flex flex-col items-center gap-2 lg:gap-3 transition-all border-orange-500 bg-orange-50 text-orange-600";
                btnQr.className = "p-4 lg:p-6 border-2 rounded-2xl lg:rounded-[2rem] flex flex-col items-center gap-2 lg:gap-3 transition-all border-slate-100 text-slate-400";
                qrBox.classList.add('hidden'); qrBox.classList.remove('flex');
            } else {
                btnQr.className = "p-4 lg:p-6 border-2 rounded-2xl lg:rounded-[2rem] flex flex-col items-center gap-2 lg:gap-3 transition-all border-blue-500 bg-blue-50 text-blue-600";
                btnCash.className = "p-4 lg:p-6 border-2 rounded-2xl lg:rounded-[2rem] flex flex-col items-center gap-2 lg:gap-3 transition-all border-slate-100 text-slate-400";
                const total = appState.tables.find(t => t.id === appState.currentTableId).cart.reduce((s, i) => s + i.price, 0);
                document.getElementById('checkout-qr-image').src = `https://img.vietqr.io/image/vietcombank-${SYSTEM_CONFIG.accountNo}-qr_only.png?amount=${total}&addInfo=THANH TOAN BAN ${appState.currentTableId}&accountName=${encodeURIComponent(SYSTEM_CONFIG.accountName)}`;
                qrBox.classList.remove('hidden'); qrBox.classList.add('flex', 'fade-in');
            }
        }

        function finalizeTransaction() {
            const table = appState.tables.find(t => t.id === appState.currentTableId);
            const total = table.cart.reduce((s, i) => s + i.price, 0);
            const now = new Date();

            processPrint('hoa-don');

            const payload = {
                date: now.toLocaleDateString('vi-VN'), time: now.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'}),
                table: `Bàn ${table.id}`, total: total, method: appState.paymentMethod, month: `${now.getMonth()+1}/${now.getFullYear()}`, year: now.getFullYear()
            };

            // Lưu lên Firebase Realtime
            if(window.FIREBASE_DB) {
                const { push, ref } = window.firebaseRefs;
                push(ref(window.FIREBASE_DB, 'pos/transactions'), payload);
            }

            table.status = 'available'; table.cart = []; table.startTime = null;
            syncStateToCloud();
            closeModal(); switchTab('tables');
            showNotification(`Đã thanh toán bàn ${table.id}!`);
        }

        function processPrint(printType) {
            const table = appState.tables.find(t => t.id === appState.currentTableId);
            const titles = { 'bep': 'PHIẾU BÁO BẾP', 'tam-tinh': 'PHIẾU TẠM TÍNH', 'hoa-don': 'HÓA ĐƠN' };
            document.getElementById('print-doc-title').innerText = titles[printType];
            document.getElementById('print-doc-table').innerText = `BÀN ${table.id}`;
            const now = new Date();
            document.getElementById('print-doc-time').innerText = `TG: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')} ${now.getDate()}/${now.getMonth()+1}`;

            const grouped = {};
            table.cart.forEach(item => { if(!grouped[item.name]) grouped[item.name] = { count: 0, price: item.price }; grouped[item.name].count++; });
            const isBep = printType === 'bep';
            document.getElementById('print-total-section').style.display = isBep ? 'none' : 'block';

            document.getElementById('print-doc-items').innerHTML = Object.keys(grouped).map(name => `
                <tr><td style="padding: 4px 0;">${name}</td><td style="text-align: center; font-weight: bold;">${grouped[name].count}</td>
                <td style="text-align: right;">${isBep ? '' : (grouped[name].price * grouped[name].count).toLocaleString()}</td></tr>
            `).join('');

            if (!isBep) {
                document.getElementById('print-doc-total').innerText = table.cart.reduce((s, i) => s + i.price, 0).toLocaleString() + 'đ';
                document.getElementById('print-doc-method').innerText = printType === 'hoa-don' ? `(${appState.paymentMethod})` : '(Chưa thu tiền)';
            }
            window.print();
        }

        // ==========================================
        // KHỐI 4: BÁO CÁO & XUẤT EXCEL/GOOGLE SHEETS
        // ==========================================
        function renderReportUI() {
            const todayStr = new Date().toLocaleDateString('vi-VN');
            document.getElementById('report-date').innerText = `Cập nhật: ${new Date().toLocaleString('vi-VN')}`;
            const todayData = appState.transactions.filter(t => t.date === todayStr);
            const sumTotal = todayData.reduce((s, t) => s + parseInt(t.total || 0), 0);
            const sumCash = todayData.filter(t => t.method === 'Tiền mặt').reduce((s, t) => s + parseInt(t.total || 0), 0);
            const sumQR = todayData.filter(t => t.method === 'Chuyển khoản').reduce((s, t) => s + parseInt(t.total || 0), 0);

            document.getElementById('report-dashboard').innerHTML = `
                <div class="bg-gray-900 p-6 lg:p-8 rounded-3xl lg:rounded-[2.5rem] text-white"><p class="text-[9px] lg:text-[10px] font-black uppercase text-gray-400 mb-1 lg:mb-2">DOANH THU</p><h2 class="text-3xl lg:text-4xl font-black text-orange-500">${sumTotal.toLocaleString()}đ</h2><p class="text-[9px] mt-2 text-gray-500">${todayData.length} đơn</p></div>
                <div class="bg-white p-6 lg:p-8 rounded-3xl lg:rounded-[2.5rem] border"><p class="text-[9px] lg:text-[10px] font-black uppercase text-slate-400">Tiền Mặt</p><h2 class="text-2xl lg:text-3xl font-black mt-1 lg:mt-2">${sumCash.toLocaleString()}đ</h2></div>
                <div class="bg-blue-50 p-6 lg:p-8 rounded-3xl lg:rounded-[2.5rem] border border-blue-100"><p class="text-[9px] lg:text-[10px] font-black uppercase text-blue-400">Chuyển Khoản</p><h2 class="text-2xl lg:text-3xl font-black text-blue-700 mt-1 lg:mt-2">${sumQR.toLocaleString()}đ</h2></div>
            `;

            document.getElementById('report-history').innerHTML = [...todayData].reverse().slice(0, 20).map(t => `
                <div class="flex justify-between items-center p-4 lg:p-5 bg-slate-50 rounded-xl lg:rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-3 lg:gap-4">
                        <div class="w-8 h-8 lg:w-10 lg:h-10 rounded-full bg-white flex items-center justify-center"><i class="fa-solid ${t.method === 'Tiền mặt' ? 'fa-wallet text-green-500' : 'fa-building-columns text-blue-500'}"></i></div>
                        <div><p class="text-[10px] lg:text-[11px] font-black uppercase">${t.table}</p><p class="text-[8px] lg:text-[9px] text-slate-400 mt-0.5">${t.time} • ${t.method}</p></div>
                    </div>
                    <span class="text-xs lg:text-sm font-black ${t.method === 'Tiền mặt' ? 'text-gray-900' : 'text-blue-600'}">+${parseInt(t.total).toLocaleString()}đ</span>
                </div>
            `).join('');
        }

        // TÍNH NĂNG 1: XUẤT FILE EXCEL / CSV
        function exportToCSV() {
            const todayStr = new Date().toLocaleDateString('vi-VN');
            const dataToExport = appState.transactions.filter(t => t.date === todayStr);
            
            if(dataToExport.length === 0) return showNotification("Hôm nay chưa có doanh thu!", "warning");

            // BOM \uFEFF giúp Excel đọc tiếng Việt không bị lỗi font
            const headers = ["Ngày", "Giờ", "Bàn", "Phương thức", "Tổng tiền (VNĐ)"];
            const rows = dataToExport.map(t => [t.date, t.time, t.table, t.method, t.total]);
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Doanh_Thu_${todayStr.replace(/\//g,'-')}.csv`);
            document.body.appendChild(link);
            link.click();
            link.remove();
            showNotification("Đã tải xuống file Excel thành công!");
        }

        // TÍNH NĂNG 2: ĐỒNG BỘ LÊN GOOGLE SHEETS
        async function syncToGoogleSheets() {
            const todayStr = new Date().toLocaleDateString('vi-VN');
            const dataToExport = appState.transactions.filter(t => t.date === todayStr);
            
            if(dataToExport.length === 0) return showNotification("Không có dữ liệu để đồng bộ!", "warning");
            
            showNotification("Đang nén và gửi lên Google Sheets...", "warning");
            
            // Vì Google Apps Script thường nhận từng dòng, ta sẽ gom tổng quan ngày hôm đó để đỡ spam
            const sumTotal = dataToExport.reduce((s, t) => s + parseInt(t.total || 0), 0);
            
            const payload = {
                date: todayStr,
                time: new Date().toLocaleTimeString('vi-VN'),
                table: `TỔNG KẾT NGÀY (${dataToExport.length} đơn)`,
                total: sumTotal,
                method: "Hệ thống tự đồng bộ",
                month: `${new Date().getMonth()+1}/${new Date().getFullYear()}`,
                year: new Date().getFullYear()
            };

            try {
                // Sử dụng mode no-cors kế thừa từ V43 để tránh lỗi Cross-Origin
                await fetch(SYSTEM_CONFIG.scriptUrl, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                });
                showNotification("Đã lưu tổng kết ngày lên Google Sheets!", "success");
            } catch (err) {
                showNotification("Lỗi mạng khi kết nối Google Sheets!", "error");
            }
        }

        // INIT
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('vi-VN'); }, 1000);
        window.onload = () => {
            initializeSystemData();
            setTimeout(() => {
                initRealtimeSync();
                switchTab('tables');
            }, 800);
        };
    </script>
</body>
</html>
