<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÁT LA POS V16 - PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f8f8f8; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #f97316 !important; border-bottom: 3px solid #f97316; }
        .item-card:active { transform: scale(0.95); background: #fff7ed; }
        #cartDrawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        .drawer-open { transform: translateY(0) !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <script>
        // PHÁT DÁN LINK GOOGLE APPS SCRIPT VÀO ĐÂY
        const GOOGLE_SHEET_URL = "DÁN_LINK_CỦA_PHÁT_VÀO_ĐÂY";
    </script>

    <header class="bg-white px-5 py-3 flex justify-between items-center border-b shrink-0 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white font-bold text-[10px]">PL</div>
            <h1 class="text-xs font-black uppercase tracking-tighter">Phát La Coffee</h1>
        </div>
        <div id="clock" class="text-[9px] font-bold text-gray-300"></div>
    </header>

    <nav class="bg-white flex border-b shrink-0">
        <button onclick="showTab('tables')" id="btn-tables" class="flex-1 py-4 text-[10px] font-bold uppercase active-tab">Sơ đồ bàn</button>
        <button onclick="showTab('pos')" id="btn-pos" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">Gọi món</button>
        <button onclick="showTab('report')" id="btn-report" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">Thống kê</button>
    </nav>

    <main class="flex-1 relative overflow-hidden">
        <section id="tab-tables" class="absolute inset-0 p-4 overflow-y-auto">
            <button onclick="selectTakeaway()" class="w-full mb-4 py-4 bg-orange-500 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg">ĐƠN MANG VỀ</button>
            <div class="grid grid-cols-3 gap-3" id="tableGrid"></div>
        </section>

        <section id="tab-pos" class="absolute inset-0 flex flex-col hidden bg-gray-50">
            <div class="p-2 flex gap-2 overflow-x-auto no-scrollbar" id="catBar"></div>
            <div class="flex-1 overflow-y-auto p-2">
                <div class="grid grid-cols-2 gap-2" id="menuGrid"></div>
            </div>
            
            <div class="bg-white p-4 border-t shadow-[0_-10px_25px_rgba(0,0,0,0.05)] shrink-0 space-y-3">
                <div class="flex justify-between items-center px-1">
                    <span id="labelTable" class="text-[9px] font-black uppercase bg-black text-white px-2 py-0.5 rounded">BÀN</span>
                    <span id="cartTotal" class="text-xl font-bold text-orange-600">0đ</span>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="confirmPayment('Tiền mặt')" class="py-4 bg-gray-100 text-gray-600 rounded-xl font-bold text-[10px] uppercase active:bg-gray-200">Tiền mặt</button>
                    <button onclick="confirmPayment('Chuyển khoản')" class="py-4 bg-orange-500 text-white rounded-xl font-bold text-[10px] uppercase shadow-md active:scale-95 transition-all">Chuyển khoản</button>
                </div>
                
                <div class="flex items-center justify-center gap-2 py-2 bg-blue-50/50 rounded-lg border border-blue-100">
                    <i class="fa-solid fa-building-columns text-blue-400 text-[10px]"></i>
                    <span class="text-[10px] font-bold text-blue-600 uppercase">Vietcombank: 1046778674</span>
                </div>
            </div>
        </section>

        <section id="tab-report" class="absolute inset-0 p-6 hidden overflow-y-auto bg-white">
            <div class="text-center mb-8">
                <h2 id="statToday" class="text-3xl font-black mb-1">0đ</h2>
                <p class="text-[9px] text-gray-400 uppercase tracking-widest">Doanh thu hôm nay</p>
            </div>
            <div id="orderHistory" class="space-y-2"></div>
        </section>
    </main>

    <script>
        const menu = [
            { cat: "CÀ PHÊ", name: "Espresso", price: 45000, icon: "fa-mug-hot" },
            { cat: "CÀ PHÊ", name: "Americano", price: 50000, icon: "fa-mug-hot" },
            { cat: "TRÀ", name: "Trà Đào", price: 50000, icon: "fa-leaf" },
            { cat: "ĐÁ XAY", name: "Matcha Frappe", price: 75000, icon: "fa-ice-cream" },
            { cat: "ĐẶC BIỆT", name: "Cà Phê Trứng", price: 60000, icon: "fa-egg" }
        ];

        let tables = JSON.parse(localStorage.getItem('pl_v16_tables')) || Array.from({length: 12}, (_, i) => ({ id: i+1, status: 'available', cart: [] }));
        let orders = JSON.parse(localStorage.getItem('pl_v16_orders')) || [];
        let curTable = null, activeCart = [], isTakeaway = false, curCat = "TẤT CẢ";

        function showTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active-tab');
            if(t==='tables') renderTables();
            if(t==='report') renderStats();
        }

        function renderTables() {
            document.getElementById('tableGrid').innerHTML = tables.map(t => `
                <div onclick="selectTable(${t.id})" class="p-4 rounded-2xl border text-center transition-all ${t.status==='available'?'bg-white border-gray-100':'bg-black text-white border-black'}">
                    <b class="text-[10px]">BÀN ${t.id}</b>
                </div>
            `).join('');
        }

        function selectTable(id) {
            curTable = id; isTakeaway = false;
            document.getElementById('labelTable').innerText = `BÀN ${id}`;
            activeCart = [...tables.find(t => t.id === id).cart];
            updateCartUI(); showTab('pos');
        }

        function selectTakeaway() {
            curTable = null; isTakeaway = true; activeCart = [];
            document.getElementById('labelTable').innerText = `MANG VỀ`;
            updateCartUI(); showTab('pos');
        }

        function renderCats() {
            const cats = ["TẤT CẢ", ...new Set(menu.map(m => m.cat))];
            document.getElementById('catBar').innerHTML = cats.map(c => `
                <button onclick="setCat('${c}')" class="px-4 py-2 rounded-lg border text-[9px] font-bold shrink-0 ${curCat===c?'bg-black text-white border-black':'bg-white text-gray-400 border-gray-100'}">${c}</button>
            `).join('');
        }

        function setCat(c) { curCat = c; renderCats(); renderMenu(); }

        function renderMenu() {
            const list = curCat === "TẤT CẢ" ? menu : menu.filter(m => m.cat === curCat);
            document.getElementById('menuGrid').innerHTML = list.map(m => `
                <div onclick="addToCart('${m.name}', ${m.price})" class="item-card bg-white p-3 rounded-xl border border-gray-50 h-24 flex flex-col justify-between shadow-sm">
                    <i class="fa-solid ${m.icon} text-orange-500 text-[10px]"></i>
                    <p class="text-[9px] font-bold uppercase leading-tight">${m.name}</p>
                    <p class="text-[10px] font-bold text-gray-300">${m.price.toLocaleString()}đ</p>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            activeCart.push({name, price});
            updateCartUI();
            if(!isTakeaway) {
                const t = tables.find(x => x.id === curTable);
                t.status = 'occupied'; t.cart = activeCart;
                localStorage.setItem('pl_v16_tables', JSON.stringify(tables));
            }
        }

        function updateCartUI() {
            let total = activeCart.reduce((s,c)=>s+c.price, 0);
            document.getElementById('cartTotal').innerText = total.toLocaleString() + 'đ';
        }

        async function confirmPayment(method) {
            if(!activeCart.length) return;
            const now = new Date();
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            const data = {
                date: now.toLocaleDateString('vi-VN'),
                time: now.toLocaleTimeString('vi-VN'),
                table: isTakeaway ? 'Mang về' : `Bàn ${curTable}`,
                total: total,
                method: method
            };

            try {
                // TỰ ĐỘNG ĐẨY LÊN GOOGLE SHEETS
                if(GOOGLE_SHEET_URL && GOOGLE_SHEET_URL.startsWith("http")) {
                    await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                }
                
                orders.unshift(data);
                localStorage.setItem('pl_v16_orders', JSON.stringify(orders));
                if(!isTakeaway) {
                    const t = tables.find(x => x.id === curTable);
                    t.status = 'available'; t.cart = [];
                    localStorage.setItem('pl_v16_tables', JSON.stringify(tables));
                }
                alert(`Thanh toán thành công qua ${method.toUpperCase()}!`);
                activeCart = []; updateCartUI();
                showTab('tables');
            } catch (e) { alert("Lỗi lưu trữ dữ liệu."); }
        }

        function renderStats() {
            const today = new Date().toLocaleDateString('vi-VN');
            const daily = orders.filter(o => o.date === today).reduce((s,o)=>s+o.total, 0);
            document.getElementById('statToday').innerText = daily.toLocaleString() + 'đ';
            document.getElementById('orderHistory').innerHTML = orders.slice(0, 15).map(o => `
                <div class="flex justify-between p-3 bg-gray-50 rounded-lg text-[9px] border border-gray-100">
                    <span class="text-gray-400 font-medium">${o.time} (${o.table}) - ${o.method}</span>
                    <b class="text-gray-800">+${o.total.toLocaleString()}đ</b>
                </div>
            `).join('');
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.onload = () => { renderCats(); renderMenu(); showTab('tables'); };
    </script>
</body>
</html>
