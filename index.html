<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÁT LA POS | SHEET SYNC V17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f8f8f8; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #f97316 !important; border-bottom: 3px solid #f97316; }
        .item-card:active { transform: scale(0.95); background: #fff7ed; }
        #cartDrawer { transition: transform 0.3s ease-out; }
        .drawer-open { transform: translateY(0) !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-white px-5 py-3 flex justify-between items-center border-b shrink-0">
        <h1 class="text-xs font-black uppercase tracking-tighter">Phát La Coffee</h1>
        <div id="clock" class="text-[9px] font-bold text-gray-300"></div>
    </header>

    <nav class="bg-white flex border-b shrink-0 shadow-sm">
        <button onclick="showTab('tables')" id="btn-tables" class="flex-1 py-3 text-[10px] font-bold uppercase active-tab">Bàn</button>
        <button onclick="showTab('pos')" id="btn-pos" class="flex-1 py-3 text-[10px] font-bold uppercase text-gray-400">Gọi món</button>
        <button onclick="showTab('report')" id="btn-report" class="flex-1 py-3 text-[10px] font-bold uppercase text-gray-400">Báo cáo</button>
    </nav>

    <main class="flex-1 relative overflow-hidden">
        
        <section id="tab-tables" class="absolute inset-0 p-4 overflow-y-auto">
            <button onclick="selectTakeaway()" class="w-full mb-4 py-4 bg-orange-500 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg">ĐƠN MANG VỀ</button>
            <div class="grid grid-cols-3 gap-3" id="tableGrid"></div>
        </section>

        <section id="tab-pos" class="absolute inset-0 flex flex-col hidden bg-gray-50">
            <div class="p-2 flex gap-2 overflow-x-auto no-scrollbar" id="catBar"></div>
            <div class="flex-1 overflow-y-auto p-2">
                <div class="grid grid-cols-2 gap-2" id="menuGrid"></div>
            </div>
            
            <div class="bg-white p-4 border-t shadow-lg shrink-0">
                <div class="flex justify-between items-center mb-3">
                    <span id="labelTable" class="text-[9px] font-bold bg-black text-white px-2 py-0.5 rounded">BÀN</span>
                    <span id="cartTotal" class="text-lg font-bold text-orange-600">0đ</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleCart()" class="bg-gray-100 p-4 rounded-xl text-gray-600"><i class="fa-solid fa-list-ul"></i></button>
                    <button onclick="confirmPayment()" class="flex-1 py-4 bg-orange-500 text-white rounded-xl font-bold text-[10px] uppercase tracking-widest">THANH TOÁN NGAY</button>
                </div>
            </div>
        </section>

        <section id="tab-report" class="absolute inset-0 p-6 hidden overflow-y-auto bg-white text-center">
            <h2 id="statToday" class="text-3xl font-black mb-1">0đ</h2>
            <p class="text-[9px] text-gray-400 uppercase tracking-widest mb-6">Doanh thu hôm nay</p>
            
            <button onclick="exportToSheet()" class="w-full mb-8 py-3 bg-green-600 text-white rounded-xl font-bold text-[10px] uppercase shadow-md flex items-center justify-center gap-2">
                <i class="fa-solid fa-file-excel"></i> Kết toán & Xuất file Trang tính
            </button>

            <div id="orderHistory" class="space-y-2 text-left"></div>
        </section>
    </main>

    <div id="cartDrawer" class="fixed inset-x-0 bottom-0 h-[60vh] bg-white rounded-t-[30px] shadow-2xl z-50 transform translate-y-full flex flex-col border-t">
        <div class="p-6 border-b flex justify-between">
            <b class="text-xs uppercase">Chi tiết món đã chọn</b>
            <button onclick="toggleCart()" class="text-gray-300">Đóng</button>
        </div>
        <div id="cartList" class="flex-1 overflow-y-auto p-6"></div>
    </div>

    <script>
        const menu = [
            { cat: "CÀ PHÊ", name: "Đen Đá", price: 35000, icon: "fa-mug-hot" },
            { cat: "CÀ PHÊ", name: "Sữa Đá", price: 40000, icon: "fa-glass-water" },
            { cat: "TRÀ", name: "Trà Đào", price: 50000, icon: "fa-leaf" },
            { cat: "ĐÁ XAY", name: "Matcha", price: 75000, icon: "fa-ice-cream" }
        ];

        let tables = JSON.parse(localStorage.getItem('pl_v17_tables')) || Array.from({length: 12}, (_, i) => ({ id: i+1, status: 'available', cart: [] }));
        let orders = JSON.parse(localStorage.getItem('pl_v17_orders')) || [];
        let curTable = null, activeCart = [], isTakeaway = false, curCat = "TẤT CẢ";

        function showTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active-tab');
            if(t==='tables') renderTables();
            if(t==='report') renderStats();
        }

        function renderTables() {
            document.getElementById('tableGrid').innerHTML = tables.map(t => `
                <div onclick="selectTable(${t.id})" class="p-4 rounded-2xl border text-center active:scale-95 transition-all ${t.status==='available'?'bg-white':'bg-black text-white'}">
                    <b class="text-[10px]">BÀN ${t.id}</b>
                </div>
            `).join('');
        }

        function selectTable(id) {
            curTable = id; isTakeaway = false;
            document.getElementById('labelTable').innerText = `BÀN ${id}`;
            activeCart = [...tables.find(t => t.id === id).cart];
            updateCartUI(); showTab('pos');
        }

        function selectTakeaway() {
            curTable = null; isTakeaway = true; activeCart = [];
            document.getElementById('labelTable').innerText = `MANG VỀ`;
            updateCartUI(); showTab('pos');
        }

        function renderCats() {
            const cats = ["TẤT CẢ", ...new Set(menu.map(m => m.cat))];
            document.getElementById('catBar').innerHTML = cats.map(c => `
                <button onclick="setCat('${c}')" class="px-4 py-2 rounded-lg border text-[9px] font-bold ${curCat===c?'bg-black text-white':'bg-white text-gray-400'}">${c}</button>
            `).join('');
        }

        function setCat(c) { curCat = c; renderCats(); renderMenu(); }

        function renderMenu() {
            const list = curCat === "TẤT CẢ" ? menu : menu.filter(m => m.cat === curCat);
            document.getElementById('menuGrid').innerHTML = list.map(m => `
                <div onclick="addToCart('${m.name}', ${m.price})" class="item-card bg-white p-3 rounded-xl border h-24 flex flex-col justify-between">
                    <i class="fa-solid ${m.icon} text-orange-500 text-[10px]"></i>
                    <p class="text-[9px] font-bold uppercase leading-none">${m.name}</p>
                    <p class="text-[10px] font-bold text-gray-300">${m.price.toLocaleString()}đ</p>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            activeCart.push({name, price});
            updateCartUI();
            if(!isTakeaway) {
                const t = tables.find(x => x.id === curTable);
                t.status = 'occupied'; t.cart = activeCart;
                localStorage.setItem('pl_v17_tables', JSON.stringify(tables));
            }
        }

        function updateCartUI() {
            let total = activeCart.reduce((s,c)=>s+c.price, 0);
            document.getElementById('cartList').innerHTML = activeCart.map((c, i) => `
                <div class="flex justify-between py-3 border-b text-[10px]">
                    <b>${c.name}</b>
                    <div class="flex gap-4"><span>${c.price.toLocaleString()}</span><button onclick="remove(${i})" class="text-red-400">✕</button></div>
                </div>
            `).join('');
            document.getElementById('cartTotal').innerText = total.toLocaleString() + 'đ';
        }

        function remove(i) {
            activeCart.splice(i, 1);
            if(activeCart.length === 0 && !isTakeaway) tables.find(x => x.id === curTable).status = 'available';
            updateCartUI();
        }

        function toggleCart() { document.getElementById('cartDrawer').classList.toggle('drawer-open'); }

        function confirmPayment() {
            if(!activeCart.length) return;
            const orderData = { 
                table: isTakeaway ? 'MANG VỀ' : `BÀN ${curTable}`,
                total: activeCart.reduce((s,c)=>s+c.price, 0), 
                time: new Date().toLocaleTimeString('vi-VN'), 
                date: new Date().toLocaleDateString('vi-VN') 
            };
            orders.unshift(orderData);
            localStorage.setItem('pl_v17_orders', JSON.stringify(orders));
            if(!isTakeaway) {
                const t = tables.find(x => x.id === curTable);
                t.status = 'available'; t.cart = [];
                localStorage.setItem('pl_v17_tables', JSON.stringify(tables));
            }
            alert("Đã thanh toán!");
            activeCart = []; updateCartUI();
            showTab('tables');
        }

        function renderStats() {
            const today = new Date().toLocaleDateString('vi-VN');
            const daily = orders.filter(o => o.date === today).reduce((s,o)=>s+o.total, 0);
            document.getElementById('statToday').innerText = daily.toLocaleString() + 'đ';
            document.getElementById('orderHistory').innerHTML = orders.slice(0, 10).map(o => `
                <div class="flex justify-between p-3 bg-gray-50 rounded-lg text-[9px]">
                    <span>${o.time} (${o.table})</span>
                    <b>+${o.total.toLocaleString()}</b>
                </div>
            `).join('');
        }

        // TẠO FILE GOOGLE TRANG TÍNH (CSV)
        function exportToSheet() {
            if(orders.length === 0) { alert("Chưa có dữ liệu để xuất!"); return; }
            let csv = "\uFEFFNgày,Giờ,Vị trí,Tổng tiền\n";
            orders.forEach(o => {
                csv += `${o.date},${o.time},${o.table},${o.total}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `ThongKe_PhatLa_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            alert("Đã tải file thống kê! Phát có thể tải tệp này lên Google Trang tính nhé.");
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.onload = () => { renderCats(); renderMenu(); showTab('tables'); };
    </script>
</body>
</html>
