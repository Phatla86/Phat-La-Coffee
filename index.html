<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHAT LA COFFEE POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f8f8f8; }
        .active-tab { color: #f97316 !important; border-bottom: 3px solid #f97316; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <script>const GOOGLE_SHEET_URL = "DÁN_LINK_CỦA_PHÁT_VÀO_ĐÂY";</script>

    <header class="bg-white px-5 py-3 border-b shrink-0 flex justify-between items-center">
        <h1 class="text-xs font-black uppercase tracking-tighter">Urban Coffee</h1>
        <div id="status" class="text-[8px] font-bold text-green-500 uppercase">Hệ thống sẵn sàng</div>
    </header>

    <nav class="bg-white flex border-b shrink-0 shadow-sm">
        <button onclick="showTab('tables')" id="btn-tables" class="flex-1 py-4 text-[10px] font-bold uppercase active-tab">Sơ đồ bàn</button>
        <button onclick="showTab('pos')" id="btn-pos" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">Gọi món</button>
    </nav>

    <main class="flex-1 relative overflow-hidden">
        <section id="tab-tables" class="absolute inset-0 p-4 overflow-y-auto">
            <div class="grid grid-cols-3 gap-3" id="tableGrid"></div>
        </section>
        <section id="tab-pos" class="absolute inset-0 flex flex-col hidden bg-gray-50">
            <div id="menuGrid" class="flex-1 overflow-y-auto p-2 grid grid-cols-2 gap-2"></div>
            <div class="bg-white p-4 border-t shadow-lg">
                <div class="flex justify-between mb-3"><span id="labelTable" class="text-[9px] font-bold uppercase bg-black text-white px-2">BÀN</span><span id="cartTotal" class="text-lg font-bold text-orange-600">0đ</span></div>
                <button onclick="confirmPayment()" id="payBtn" class="w-full py-4 bg-orange-500 text-white rounded-xl font-bold text-[10px] uppercase">Thanh toán & Lưu doanh thu</button>
            </div>
        </section>
    </main>

    <script>
        const menu = [
            { name: "Espresso", price: 45000, icon: "fa-mug-hot" },
            { name: "Americano", price: 50000, icon: "fa-mug-hot" },
            { name: "Latte", price: 55000, icon: "fa-mug-hot" },
            { name: "Trà Đào", price: 50000, icon: "fa-leaf" },
            { name: "Matcha Frappe", price: 75000, icon: "fa-ice-cream" },
            { name: "Cà Phê Sữa Đá", price: 45000, icon: "fa-glass-water" },
            { name: "Affogato", price: 80000, icon: "fa-star" }
        ];
        let tables = Array.from({length: 12}, (_, i) => ({ id: i+1, status: 'available', cart: [] }));
        let curTable = null, activeCart = [];

        function showTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active-tab');
            if(t==='tables') renderTables();
        }

        function renderTables() {
            document.getElementById('tableGrid').innerHTML = tables.map(t => `<div onclick="selectTable(${t.id})" class="p-4 rounded-2xl border text-center ${t.status==='available'?'bg-white':'bg-black text-white'}"><b class="text-[10px]">BÀN ${t.id}</b></div>`).join('');
        }

        function selectTable(id) {
            curTable = id; document.getElementById('labelTable').innerText = `BÀN ${id}`;
            activeCart = [...tables.find(t => t.id === id).cart];
            updateCartUI(); showTab('pos');
        }

        function renderMenu() {
            document.getElementById('menuGrid').innerHTML = menu.map(m => `<div onclick="addToCart('${m.name}', ${m.price})" class="bg-white p-3 rounded-xl border h-24 flex flex-col justify-between shadow-sm active:scale-95 transition-all"><i class="fa-solid ${m.icon} text-orange-500 text-[10px]"></i><p class="text-[9px] font-bold uppercase leading-tight">${m.name}</p><p class="text-[10px] font-bold text-gray-300">${m.price.toLocaleString()}đ</p></div>`).join('');
        }

        function addToCart(name, price) {
            activeCart.push({name, price});
            tables.find(x => x.id === curTable).status = 'occupied';
            tables.find(x => x.id === curTable).cart = activeCart;
            updateCartUI();
        }

        function updateCartUI() {
            let total = activeCart.reduce((s,c)=>s+c.price, 0);
            document.getElementById('cartTotal').innerText = total.toLocaleString() + 'đ';
        }

        async function confirmPayment() {
            if(!activeCart.length) return;
            const btn = document.getElementById('payBtn');
            const data = { date: new Date().toLocaleDateString('vi-VN'), time: new Date().toLocaleTimeString('vi-VN'), table: `Bàn ${curTable}`, total: activeCart.reduce((s,c)=>s+c.price, 0) };
            btn.innerText = "ĐANG ĐỒNG BỘ..."; btn.disabled = true;
            try {
                if(GOOGLE_SHEET_URL.startsWith("http")) await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                const t = tables.find(x => x.id === curTable);
                t.status = 'available'; t.cart = [];
                alert("Thanh toán thành công & Đã lưu doanh thu!");
                activeCart = []; updateCartUI(); showTab('tables');
            } catch (e) { alert("Lỗi mạng!"); } finally { btn.innerText = "THANH TOÁN"; btn.disabled = false; }
        }

        window.onload = () => { renderMenu(); showTab('tables'); };
    </script>
</body>
</html>
