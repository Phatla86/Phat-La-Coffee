<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÁT LA PREMIUM - V41 MEGA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        :root { --primary: #f97316; --dark: #0f172a; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f8fafc; color: var(--dark); margin: 0; height: 100vh; overflow: hidden; }

        /* Hiệu ứng mượt mà cho UI */
        .tab-content { transition: opacity 0.25s ease-in-out; }
        .table-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2.5rem; }
        .table-card.available { background: white; border: 2px solid #e2e8f0; }
        .table-card.occupied { background: var(--primary); color: white; transform: translateY(-5px); box-shadow: 0 12px 24px -10px rgba(249, 115, 22, 0.5); }
        
        .item-card { transition: all 0.2s; border-radius: 2rem; border: 1px solid #f1f5f9; background: white; cursor: pointer; position: relative; overflow: hidden; }
        .item-card:hover { border-color: var(--primary); transform: scale(1.02); }
        .item-card:active { transform: scale(0.95); }

        .active-nav { border-bottom: 4px solid var(--primary); color: var(--dark) !important; font-weight: 900; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* CSS IN ẤN CHUẨN MÁY NHIỆT */
        @media print {
            header, nav, main, #payment-modal, .no-print { display: none !important; }
            #print-area { display: block !important; width: 80mm; padding: 2mm; background: white; color: black; font-family: 'Courier New', Courier, monospace; }
            .line { border-top: 1px dashed black; margin: 10px 0; }
        }
        #print-area { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <script>
        // === CẤU HÌNH HỆ THỐNG PHÁT LA ===
        const CONFIG = {
            shopName: "PHÁT LA PREMIUM",
            address: "Mặt Tiền Đường Lớn, TP.HCM",
            bank: "VIETCOMBANK",
            accountNo: "1046778674",
            accountName: "PHAT LA",
            // Giữ nguyên URL Script của Phát để đồng bộ Google Sheet
            scriptUrl: "https://script.google.com/macros/s/AKfycbwljq8an6b1FNSbAEAKqFYfsxVsm50VlD8xJGNgTH3khLBOPnu38fKAaHKiTIL96zM/exec"
        };

        // === FULL MENU CẬP NHẬT TỪ ẢNH MỚI ===
        const MENU = [
            // CÀ PHÊ
            { id: 1, cat: "CÀ PHÊ", name: "Espresso", price: 45000, icon: "fa-mug-hot" },
            { id: 2, cat: "CÀ PHÊ", name: "Americano", price: 50000, icon: "fa-mug-saucer" },
            { id: 3, cat: "CÀ PHÊ", name: "Latte", price: 55000, icon: "fa-glass-water" },
            { id: 4, cat: "CÀ PHÊ", name: "Cappuccino", price: 55000, icon: "fa-mug-hot" },
            { id: 5, cat: "CÀ PHÊ", name: "Flat White", price: 60000, icon: "fa-coffee" },
            { id: 6, cat: "CÀ PHÊ", name: "Cold Brew", price: 65000, icon: "fa-snowflake" },
            { id: 7, cat: "CÀ PHÊ", name: "Mocha", price: 65000, icon: "fa-chocolate-bar" },

            // ĐÁ XAY
            { id: 8, cat: "ĐÁ XAY", name: "Caramel Frappe", price: 70000, icon: "fa-ice-cream" },
            { id: 9, cat: "ĐÁ XAY", name: "Chocolate Frappe", price: 70000, icon: "fa-cookie" },
            { id: 10, cat: "ĐÁ XAY", name: "Matcha Frappe", price: 75000, icon: "fa-leaf" },
            { id: 11, cat: "ĐÁ XAY", name: "Oreo Frappe", price: 75000, icon: "fa-circle-dot" },
            { id: 12, cat: "ĐÁ XAY", name: "Cookie Frappe", price: 75000, icon: "fa-cookie-bite" },

            // TRÀ
            { id: 13, cat: "TRÀ", name: "Trà Đào", price: 50000, icon: "fa-peach" },
            { id: 14, cat: "TRÀ", name: "Trà Vải", price: 50000, icon: "fa-seedling" },
            { id: 15, cat: "TRÀ", name: "Trà Chanh", price: 45000, icon: "fa-lemon" },
            { id: 16, cat: "TRÀ", name: "Trà Xanh", price: 45000, icon: "fa-leaf" },
            { id: 17, cat: "TRÀ", name: "Trà Oolong", price: 55000, icon: "fa-mortar-pestle" },

            // SIGNATURE
            { id: 18, cat: "ĐẶC BIỆT", name: "Cà Phê Sữa Đá", price: 45000, icon: "fa-mug-hot" },
            { id: 19, cat: "ĐẶC BIỆT", name: "Bạc Xỉu", price: 50000, icon: "fa-glass-water" },
            { id: 20, cat: "ĐẶC BIỆT", name: "Cà Phê Trứng", price: 60000, icon: "fa-egg" },
            { id: 21, cat: "ĐẶC BIỆT", name: "Cà Phê Dừa", price: 65000, icon: "fa-coconut" },
            { id: 22, cat: "ĐẶC BIỆT", name: "Salted Caramel", price: 70000, icon: "fa-water" },
            { id: 23, cat: "ĐẶC BIỆT", name: "Hazelnut Latte", price: 70000, icon: "fa-nut" },
            { id: 24, cat: "ĐẶC BIỆT", name: "Vanilla Cold Brew", price: 75000, icon: "fa-ice-cream" },
            { id: 25, cat: "ĐẶC BIỆT", name: "Affogato", price: 80000, icon: "fa-ice-cream" }
        ];

        let tables = JSON.parse(localStorage.getItem('pl_v41_data')) || 
                     Array.from({length: 12}, (_, i) => ({ id: i+1, status: 'available', cart: [], startTime: null }));
        
        let currentTableId = null;
        let history = [];
        let filterCat = "TẤT CẢ";
        let payType = "Tiền mặt";
    </script>

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-600 rounded-2xl flex items-center justify-center text-white shadow-lg text-xl font-black">PL</div>
            <div>
                <h1 class="text-xs font-black uppercase">Phát La Premium</h1>
                <p id="cloud-status" class="text-[8px] font-bold text-green-500 uppercase italic">Đã đồng bộ Cloud</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p id="clock" class="text-[11px] font-black italic">00:00:00</p>
                <p class="text-[7px] font-bold text-slate-400 uppercase">POS V41 MEGA</p>
            </div>
            <button onclick="syncData()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-300 hover:text-orange-500 transition-colors">
                <i class="fa-solid fa-rotate"></i>
            </button>
        </div>
    </header>

    <nav class="bg-white border-b flex px-2 shrink-0 z-40">
        <button onclick="changeTab('tables')" id="btn-tables" class="flex-1 py-4 text-[9px] font-black uppercase tracking-widest text-slate-400 active-nav">Sơ Đồ Bàn</button>
        <button onclick="changeTab('pos')" id="btn-pos" class="flex-1 py-4 text-[9px] font-black uppercase tracking-widest text-slate-400">Gọi Món</button>
        <button onclick="changeTab('report')" id="btn-report" class="flex-1 py-4 text-[9px] font-black uppercase tracking-widest text-slate-400">Doanh Thu</button>
    </nav>

    <main class="flex-1 relative bg-slate-50 overflow-hidden">
        
        <section id="tab-tables" class="absolute inset-0 p-6 overflow-y-auto tab-content">
            <div id="table-grid" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5 max-w-6xl mx-auto"></div>
        </section>

        <section id="tab-pos" class="absolute inset-0 hidden flex flex-col lg:flex-row bg-white tab-content">
            <div id="cat-sidebar" class="w-full lg:w-44 bg-slate-50 p-3 flex lg:flex-col gap-2 overflow-x-auto no-scrollbar border-r"></div>
            
            <div class="flex-1 p-4 lg:p-6 overflow-y-auto bg-slate-100/50">
                <div id="menu-grid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            </div>
            
            <div class="w-full lg:w-[450px] flex flex-col bg-white shadow-2xl z-10 border-l">
                <div class="p-6 border-b flex justify-between items-center bg-white">
                    <div>
                        <h2 id="pos-title" class="text-xl font-black uppercase tracking-tighter">Bàn Đợi...</h2>
                        <p id="pos-time" class="text-[9px] font-bold text-slate-400">Chưa bắt đầu</p>
                    </div>
                    <button onclick="changeTab('tables')" class="text-orange-600 bg-orange-50 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Đổi bàn</button>
                </div>
                
                <div id="cart-list" class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar"></div>

                <div class="p-6 bg-white border-t-2 border-slate-50 space-y-4">
                    <div class="flex justify-between items-end">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Tổng thanh toán</span>
                        <span id="cart-total" class="text-4xl font-black text-orange-600 tracking-tighter">0đ</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="handlePrint('bep')" class="py-4 bg-blue-100 text-blue-600 rounded-2xl font-black text-[10px] uppercase shadow-sm">Báo Bếp</button>
                        <button onclick="handlePrint('tam-tinh')" class="py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-[10px] uppercase shadow-sm">Tạm Tính</button>
                    </div>
                    <button onclick="openPayment()" class="w-full py-6 bg-orange-600 text-white rounded-[2rem] font-black text-sm uppercase shadow-xl hover:bg-orange-700 transition-all active:scale-95">
                        Thanh Toán Ngay <i class="fa-solid fa-chevron-right ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <section id="tab-report" class="absolute inset-0 p-6 hidden overflow-y-auto tab-content">
            <div class="max-w-4xl mx-auto space-y-6">
                <div id="stat-cards" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest">Lịch sử giao dịch hôm nay</h3>
                    <div id="history-list" class="space-y-3"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="payment-modal" class="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[3rem] overflow-hidden flex flex-col shadow-2xl animate-modal">
            <div class="p-8 text-center border-b border-slate-50">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Số tiền thực thu</p>
                <h2 id="modal-total" class="text-5xl font-black text-orange-600 tracking-tighter">0đ</h2>
            </div>

            <div class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setPayType('Tiền mặt')" id="pay-cash" class="p-6 border-2 rounded-[2rem] flex flex-col items-center gap-3 transition-all border-orange-500 bg-orange-50">
                        <i class="fa-solid fa-money-bill-wave text-2xl text-orange-600"></i>
                        <span class="text-[10px] font-black uppercase">Tiền mặt</span>
                    </button>
                    <button onclick="setPayType('Chuyển khoản')" id="pay-qr" class="p-6 border-2 rounded-[2rem] flex flex-col items-center gap-3 transition-all border-slate-100">
                        <i class="fa-solid fa-qrcode text-2xl text-blue-600"></i>
                        <span class="text-[10px] font-black uppercase">Quét QR</span>
                    </button>
                </div>

                <div id="qr-area" class="hidden flex flex-col items-center p-6 bg-blue-50/50 rounded-3xl border border-blue-100">
                    <p class="text-[9px] font-black text-blue-600 uppercase mb-4 italic underline">Vietcombank - 1046778674</p>
                    <img id="qr-img" src="" class="w-48 h-48 border-4 border-white shadow-xl rounded-2xl">
                    <p class="text-[9px] font-bold text-slate-400 mt-4 uppercase">Chủ TK: PHAT LA</p>
                </div>
            </div>

            <div class="p-8 pt-0 flex gap-3">
                <button onclick="closePayment()" class="flex-1 py-5 bg-slate-100 text-slate-500 rounded-2xl font-black text-[10px] uppercase">Hủy bỏ</button>
                <button onclick="completeOrder()" class="flex-[2] py-5 bg-gray-900 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all">Xác nhận đơn</button>
            </div>
        </div>
    </div>

    <div id="print-area">
        <center>
            <h1 style="margin:0; font-size: 22px; font-weight: 900;">${CONFIG.shopName}</h1>
            <p style="font-size: 10px; margin: 5px 0;">${CONFIG.address}</p>
            <div class="line"></div>
            <h2 id="p-title" style="margin: 10px 0; font-size: 16px;">HÓA ĐƠN</h2>
            <p id="p-table" style="font-size: 14px; font-weight: bold;"></p>
            <p id="p-time" style="font-size: 9px;"></p>
        </center>
        <div class="line"></div>
        <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
            <tbody id="p-items"></tbody>
        </table>
        <div class="line"></div>
        <div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 16px; padding: 10px 0;">
            <span>TỔNG CỘNG:</span> <span id="p-total">0đ</span>
        </div>
        <p id="p-method" style="font-size: 10px; font-style: italic; text-align: center;"></p>
        <div class="line"></div>
        <center><p style="font-size: 10px; margin-top: 15px;">Cảm ơn Phát La. Chào tạm biệt!</p></center>
    </div>

    <script>
        /* === LOGIC XỬ LÝ CHÍNH === */

        function changeTab(id) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav', 'text-slate-400'));
            const target = document.getElementById(`tab-${id}`);
            id === 'pos' ? target.classList.add('flex') : target.classList.remove('hidden');
            document.getElementById(`btn-${id}`).classList.add('active-nav');
            
            if(id === 'tables') renderTables();
            if(id === 'pos') renderMenu();
            if(id === 'report') syncData();
        }

        function renderTables() {
            document.getElementById('table-grid').innerHTML = tables.map(t => `
                <div onclick="selectTable(${t.id})" class="table-card ${t.status} p-10 flex flex-col items-center justify-center cursor-pointer shadow-sm active:scale-90">
                    <span class="text-[8px] font-black opacity-30 uppercase mb-1">Bàn</span>
                    <b class="text-3xl font-black">${t.id < 10 ? '0'+t.id : t.id}</b>
                    ${t.status === 'occupied' ? `<span class="text-[9px] font-bold mt-2 opacity-80">${t.startTime}</span>` : ''}
                </div>
            `).join('');
        }

        function selectTable(id) {
            currentTableId = id;
            const t = tables.find(x => x.id === id);
            if(!t.startTime) t.startTime = new Date().toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('pos-title').innerText = `BÀN ${id < 10 ? '0'+id : id}`;
            document.getElementById('pos-time').innerText = `Thời gian vào: ${t.startTime}`;
            renderCart();
            changeTab('pos');
        }

        function renderMenu() {
            const cats = ["TẤT CẢ", ...new Set(MENU.map(m => m.cat))];
            document.getElementById('cat-sidebar').innerHTML = cats.map(c => `
                <button onclick="filterCat='${c}';renderMenu()" class="px-5 py-4 rounded-2xl text-[9px] font-black uppercase transition-all shrink-0 ${filterCat === c ? 'bg-orange-600 text-white shadow-lg' : 'bg-white text-slate-400'}">
                    ${c}
                </button>
            `).join('');

            const items = filterCat === "TẤT CẢ" ? MENU : MENU.filter(m => m.cat === filterCat);
            document.getElementById('menu-grid').innerHTML = items.map(m => `
                <div onclick="addToCart(${m.id})" class="item-card p-6 flex flex-col justify-between h-44 shadow-sm border border-slate-100">
                    <div class="w-10 h-10 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center text-sm"><i class="fa-solid ${m.icon}"></i></div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-800 leading-tight mb-1">${m.name}</p>
                        <p class="text-[11px] font-bold text-orange-600">${m.price.toLocaleString()}đ</p>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = MENU.find(p => p.id === id);
            const table = tables.find(t => t.id === currentTableId);
            table.status = 'occupied';
            table.cart.push({...product, tempId: Date.now()});
            saveData();
            renderCart();
        }

        function removeFromCart(tempId) {
            const table = tables.find(t => t.id === currentTableId);
            table.cart = table.cart.filter(x => x.tempId !== tempId);
            if(table.cart.length === 0) { table.status = 'available'; table.startTime = null; }
            saveData();
            renderCart();
        }

        function renderCart() {
            const table = tables.find(t => t.id === currentTableId);
            const list = document.getElementById('cart-list');
            if(!table.cart.length) {
                list.innerHTML = `<div class="h-full flex flex-col items-center justify-center opacity-10 mt-20"><i class="fa-solid fa-mug-hot text-6xl mb-4"></i><p class="text-xs font-black uppercase">Chưa có món</p></div>`;
                document.getElementById('cart-total').innerText = "0đ";
                return;
            }
            list.innerHTML = table.cart.map(x => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 animate-modal">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid ${x.icon} text-orange-500 text-[10px]"></i>
                        <span class="text-[10px] font-black uppercase">${x.name}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-bold text-slate-400">${x.price.toLocaleString()}đ</span>
                        <button onclick="removeFromCart(${x.tempId})" class="text-red-400 hover:text-red-600 p-2 text-xs">✕</button>
                    </div>
                </div>
            `).join('');
            const total = table.cart.reduce((s,i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = total.toLocaleString() + 'đ';
        }

        /* === XỬ LÝ THANH TOÁN === */

        function openPayment() {
            const total = tables.find(t => t.id === currentTableId).cart.reduce((s,i) => s + i.price, 0);
            if(total === 0) return;
            document.getElementById('modal-total').innerText = total.toLocaleString() + 'đ';
            document.getElementById('payment-modal').classList.remove('hidden');
            setPayType('Tiền mặt');
        }

        function closePayment() { document.getElementById('payment-modal').classList.add('hidden'); }

        function setPayType(type) {
            payType = type;
            const cash = document.getElementById('pay-cash');
            const qr = document.getElementById('pay-qr');
            const qrArea = document.getElementById('qr-area');

            if(type === 'Tiền mặt') {
                cash.className = "p-6 border-2 rounded-[2rem] flex flex-col items-center gap-3 transition-all border-orange-500 bg-orange-50";
                qr.className = "p-6 border-2 rounded-[2rem] flex flex-col items-center gap-3 transition-all border-slate-100";
                qrArea.classList.add('hidden');
            } else {
                qr.className = "p-6 border-2 rounded-[2rem] flex flex-col items-center gap-3 transition-all border-blue-500 bg-blue-50";
                cash.className = "p-6 border-2 rounded-[2rem] flex flex-col items-center gap-3 transition-all border-slate-100";
                qrArea.classList.remove('hidden');
                
                const total = tables.find(t => t.id === currentTableId).cart.reduce((s,i) => s + i.price, 0);
                document.getElementById('qr-img').src = `https://img.vietqr.io/image/vietcombank-${CONFIG.accountNo}-compact2.png?amount=${total}&addInfo=BAN%20${currentTableId}%20THANH%20TOAN&accountName=PHAT%20LA`;
            }
        }

        async function completeOrder() {
            const t = tables.find(x => x.id === currentTableId);
            const total = t.cart.reduce((s,i) => s + i.price, 0);
            const now = new Date();

            handlePrint('hoa-don');

            const order = {
                date: now.toLocaleDateString('vi-VN'),
                time: now.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'}),
                table: `Bàn ${t.id}`,
                total: total,
                method: payType,
                month: (now.getMonth()+1)+"/"+now.getFullYear(),
                year: now.getFullYear()
            };

            // Reset bàn
            t.status = 'available'; t.cart = []; t.startTime = null;
            saveData();
            closePayment();
            changeTab('tables');

            // Gửi dữ liệu Cloud
            try {
                await fetch(CONFIG.scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(order) });
                document.getElementById('cloud-status').innerText = "Đã đồng bộ Cloud";
            } catch(e) {
                document.getElementById('cloud-status').innerText = "Đang chạy Offline";
            }
            syncData();
        }

        function handlePrint(type) {
            const t = tables.find(x => x.id === currentTableId);
            const total = t.cart.reduce((s,i) => s + i.price, 0);

            document.getElementById('p-title').innerText = type === 'bep' ? "BÁO BẾP" : (type === 'tam-tinh' ? "TẠM TÍNH" : "HÓA ĐƠN");
            document.getElementById('p-table').innerText = `BÀN: ${t.id}`;
            document.getElementById('p-time').innerText = `Ngày: ${new Date().toLocaleString('vi-VN')}`;
            document.getElementById('p-total').innerText = total.toLocaleString() + 'đ';
            document.getElementById('p-method').innerText = type === 'hoa-don' ? `Thanh toán: ${payType}` : "";

            const summary = {};
            t.cart.forEach(m => { summary[m.name] = (summary[m.name] || 0) + 1; });
            
            document.getElementById('p-items').innerHTML = Object.keys(summary).map(name => {
                const item = t.cart.find(i => i.name === name);
                return `<tr><td style="padding:6px 0;">${name}</td><td align="center">x${summary[name]}</td><td align="right">${(item.price * summary[name]).toLocaleString()}</td></tr>`;
            }).join('');

            window.print();
        }

        async function syncData() {
            try {
                const res = await fetch(CONFIG.scriptUrl);
                history = await res.json();
                renderReport();
            } catch(e) {}
        }

        function renderReport() {
            const today = new Date().toLocaleDateString('vi-VN');
            const daily = history.filter(o => o.date === today);
            const total = daily.reduce((s,o) => s + parseInt(o.total), 0);
            const cash = daily.filter(o => o.method === 'Tiền mặt').reduce((s,o) => s + parseInt(o.total), 0);
            const transfer = daily.filter(o => o.method === 'Chuyển khoản').reduce((s,o) => s + parseInt(o.total), 0);

            document.getElementById('stat-cards').innerHTML = `
                <div class="bg-gray-900 p-8 rounded-[2.5rem] text-white shadow-xl">
                    <p class="text-[9px] font-black opacity-40 uppercase mb-2">Tổng Doanh Thu</p>
                    <h2 class="text-4xl font-black text-orange-500 tracking-tighter">${total.toLocaleString()}đ</h2>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <p class="text-[9px] font-black text-slate-300 uppercase mb-2">Tiền mặt</p>
                    <h2 class="text-2xl font-black text-green-600">${cash.toLocaleString()}đ</h2>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <p class="text-[9px] font-black text-slate-300 uppercase mb-2">Chuyển khoản</p>
                    <h2 class="text-2xl font-black text-blue-600">${transfer.toLocaleString()}đ</h2>
                </div>
            `;

            document.getElementById('history-list').innerHTML = [...daily].reverse().slice(0, 10).map(o => `
                <div class="flex justify-between items-center p-5 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-xs">
                            <i class="fa-solid ${o.method === 'Tiền mặt' ? 'fa-wallet text-green-500' : 'fa-qrcode text-blue-500'}"></i>
                        </div>
                        <div><p class="text-[10px] font-black uppercase">${o.table}</p><p class="text-[8px] font-bold text-slate-400">${o.time} • ${o.method}</p></div>
                    </div>
                    <span class="text-xs font-black">+${parseInt(o.total).toLocaleString()}</span>
                </div>
            `).join('');
        }

        function saveData() { localStorage.setItem('pl_v41_data', JSON.stringify(tables)); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN'); }, 1000);
        window.onload = () => { renderTables(); syncData(); };

    </script>
</body>
</html>
