<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÁT LA PREMIUM V35</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .active-tab { color: #f97316 !important; border-bottom: 4px solid #f97316; }
        .occupied { background-color: #f97316 !important; color: white !important; border-color: #ea580c !important; box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <script>
        // CẤU HÌNH HỆ THỐNG
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwTp1V0tas3y0096lM_9ObCtUgIegRAdhqyL9dZG4CZ2x1Z_xwK0gBsOH9W3KonxDE/exec";
        
        // THỰC ĐƠN CỐ ĐỊNH (Để không bị trắng màn hình)
        const menu = [
            { cat: "CÀ PHÊ", name: "Cà Phê Đen", price: 35000, icon: "fa-mug-hot" },
            { cat: "CÀ PHÊ", name: "Cà Phê Sữa", price: 40000, icon: "fa-glass-water" },
            { cat: "TRÀ", name: "Trà Đào Cam Sả", price: 55000, icon: "fa-leaf" },
            { cat: "TRÀ", name: "Trà Vải", price: 55000, icon: "fa-wine-glass" },
            { cat: "NƯỚC ÉP", name: "Ép Cam Tươi", price: 45000, icon: "fa-citrus" },
            { cat: "ĐÁ XAY", name: "Matcha Đá Xay", price: 65000, icon: "fa-ice-cream" },
            { cat: "SIGNATURE", name: "Phát La Special", price: 85000, icon: "fa-crown" }
        ];

        // Khởi tạo trạng thái bàn từ bộ nhớ máy
        let tables = JSON.parse(localStorage.getItem('pl_tables_v35')) || 
                     Array.from({length: 12}, (_, i) => ({ id: i+1, status: 'available', cart: [] }));
        
        let orders = []; 
        let curTable = null, activeCart = [], curCat = "TẤT CẢ";
    </script>

    <header class="bg-white px-6 py-4 flex justify-between items-center border-b shrink-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">PL</div>
            <div>
                <h1 class="text-xs font-black uppercase">Phát La Premium</h1>
                <p id="syncStatus" class="text-[8px] font-bold text-green-500 uppercase tracking-widest">Hệ thống sẵn sàng</p>
            </div>
        </div>
        <button onclick="syncData()" class="bg-orange-50 text-orange-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-orange-100 active:scale-95 transition-all">
            <i class="fa-solid fa-arrows-rotate"></i> Đồng bộ
        </button>
    </header>

    <nav class="bg-white flex border-b shrink-0 z-40">
        <button onclick="showTab('tables')" id="btn-tables" class="flex-1 py-4 text-[10px] font-bold uppercase active-tab">Sơ đồ bàn</button>
        <button onclick="showTab('pos')" id="btn-pos" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">Gọi món</button>
        <button onclick="showTab('report')" id="btn-report" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">Doanh thu</button>
    </nav>

    <main class="flex-1 relative overflow-hidden bg-gray-50">
        <section id="tab-tables" class="absolute inset-0 p-6 overflow-y-auto">
            <div id="tableGrid" class="grid grid-cols-3 md:grid-cols-6 gap-4 max-w-4xl mx-auto"></div>
        </section>

        <section id="tab-pos" class="absolute inset-0 hidden flex-col lg:flex-row bg-white">
            <div id="catBar" class="p-2 lg:p-4 bg-gray-50 flex lg:flex-col gap-2 overflow-x-auto lg:w-48 shrink-0 no-scrollbar"></div>
            <div class="flex-1 p-4 lg:p-6 overflow-y-auto grid grid-cols-2 md:grid-cols-4 gap-4" id="menuGrid"></div>
            
            <div class="lg:w-96 border-t lg:border-l flex flex-col p-6 shadow-2xl bg-white shrink-0">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex flex-col">
                        <span id="labelTable" class="bg-black text-white px-3 py-1 rounded text-[9px] font-black uppercase w-fit">BÀN</span>
                        <button onclick="showTab('tables')" class="text-[8px] font-bold text-blue-500 mt-2 uppercase">Đổi bàn</button>
                    </div>
                    <span id="cartTotal" class="text-3xl font-black text-orange-600">0đ</span>
                </div>
                <div id="cartItems" class="flex-1 overflow-y-auto space-y-2 mb-4 no-scrollbar"></div>
                <button onclick="processPayment()" class="w-full py-5 bg-gray-900 text-white rounded-[2rem] font-black text-[11px] uppercase shadow-lg active:scale-95 transition-all">Thanh toán</button>
            </div>
        </section>

        <section id="tab-report" class="absolute inset-0 p-6 hidden overflow-y-auto bg-white">
            <div id="statBox" class="bg-gray-900 p-8 rounded-[2.5rem] text-center text-white mb-8 shadow-xl"></div>
            <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest px-2">Lịch sử hôm nay</h3>
            <div id="history" class="space-y-3 pb-24"></div>
        </section>
    </main>

    <script>
        // CHỨC NĂNG HIỂN THỊ
        function showTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            const target = document.getElementById(`tab-${t}`);
            t === 'pos' ? target.classList.add('flex') : target.classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active-tab');
            if(t === 'tables') renderTables();
            if(t === 'report') renderStats();
        }

        function renderTables() {
            const grid = document.getElementById('tableGrid');
            grid.innerHTML = tables.map(t => `
                <div onclick="selectTable(${t.id})" class="p-8 rounded-[2.5rem] border-2 flex flex-col items-center cursor-pointer transition-all active:scale-90 ${t.status==='occupied'?'occupied':'bg-white border-gray-100'}">
                    <b class="text-sm font-black">${t.id}</b>
                    <span class="text-[8px] font-bold uppercase opacity-50">${t.status==='occupied'?'Có khách':'Trống'}</span>
                </div>`).join('');
        }

        function renderMenu() {
            const cats = ["TẤT CẢ", ...new Set(menu.map(m => m.cat))];
            document.getElementById('catBar').innerHTML = cats.map(c => `
                <button onclick="setCat('${c}')" class="px-5 py-2 lg:w-full lg:text-left rounded-full lg:rounded-xl border-2 text-[9px] font-black shrink-0 transition-all ${curCat===c?'bg-orange-600 border-orange-600 text-white':'bg-white text-gray-400 border-gray-100'}">${c}</button>
            `).join('');

            const filteredMenu = curCat === "TẤT CẢ" ? menu : menu.filter(m => m.cat === curCat);
            document.getElementById('menuGrid').innerHTML = filteredMenu.map(m => `
                <div onclick="addToCart('${m.name}', ${m.price})" class="bg-white p-6 rounded-[2.2rem] border-2 border-gray-50 flex flex-col justify-between h-40 cursor-pointer shadow-sm hover:border-orange-200 active:scale-95 transition-all">
                    <i class="fa-solid ${m.icon} text-orange-500 text-xl"></i>
                    <div>
                        <p class="text-[10px] font-black uppercase text-gray-800 leading-tight">${m.name}</p>
                        <p class="text-[10px] font-bold text-orange-400 mt-1">${m.price.toLocaleString()}đ</p>
                    </div>
                </div>`).join('');
        }

        function setCat(c) { curCat = c; renderMenu(); }

        function selectTable(id) {
            curTable = id;
            document.getElementById('labelTable').innerText = `BÀN ${id}`;
            const t = tables.find(x => x.id === id);
            activeCart = t.cart || [];
            updateCartUI();
            showTab('pos');
        }

        function addToCart(name, price) {
            activeCart.push({name, price});
            updateCartUI();
            const t = tables.find(x => x.id === curTable);
            t.status = 'occupied'; t.cart = activeCart;
            localStorage.setItem('pl_tables_v35', JSON.stringify(tables));
        }

        function updateCartUI() {
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            document.getElementById('cartTotal').innerText = total.toLocaleString() + 'đ';
            document.getElementById('cartItems').innerHTML = activeCart.map((i, idx) => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <span class="text-[10px] font-black uppercase">${i.name}</span>
                    <button onclick="activeCart.splice(${idx},1);updateCartUI();saveTables();" class="text-red-400 px-2 text-lg">✕</button>
                </div>`).join('');
        }

        function saveTables() {
            const t = tables.find(x => x.id === curTable);
            if(activeCart.length === 0) t.status = 'available';
            t.cart = activeCart;
            localStorage.setItem('pl_tables_v35', JSON.stringify(tables));
        }

        async function processPayment() {
            if(!activeCart.length) return;
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            const now = new Date();
            const data = { 
                date: now.toLocaleDateString('vi-VN'),
                time: now.toLocaleTimeString('vi-VN'),
                total: total, table: `Bàn ${curTable}`,
                method: "Tiền mặt", 
                month: (now.getMonth()+1)+"/"+now.getFullYear(), 
                year: now.getFullYear()
            };
            
            // Đẩy lên Cloud (Không cần đợi phản hồi để tránh lag)
            fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            
            const t = tables.find(x => x.id === curTable);
            t.status = 'available'; t.cart = [];
            localStorage.setItem('pl_tables_v35', JSON.stringify(tables));
            activeCart = []; updateCartUI(); showTab('tables');
            syncData(); // Cập nhật lại doanh thu
        }

        async function syncData() {
            const status = document.getElementById('syncStatus');
            try {
                const res = await fetch(GOOGLE_SHEET_URL);
                orders = await res.json();
                renderStats();
                status.innerText = "Đã đồng bộ Cloud";
                status.classList.replace('text-red-500', 'text-green-500');
            } catch (e) {
                status.innerText = "Đang chạy Offline";
                status.classList.add('text-red-500');
            }
        }

        function renderStats() {
            const today = new Date().toLocaleDateString('vi-VN');
            const dayTotal = orders.filter(o => o.date === today).reduce((s,o)=>s+parseInt(o.total || 0), 0);
            document.getElementById('statBox').innerHTML = `
                <p class="text-[10px] font-bold opacity-40 uppercase mb-2 tracking-widest">Doanh thu hôm nay</p>
                <h2 class="text-4xl font-black text-orange-500 tracking-tighter">${dayTotal.toLocaleString()}đ</h2>
            `;
            document.getElementById('history').innerHTML = [...orders].reverse().slice(0,15).map(o => `
                <div class="bg-white p-5 rounded-2xl flex justify-between items-center border border-gray-100 shadow-sm">
                    <div>
                        <b class="text-[11px] uppercase text-gray-800">${o.table}</b>
                        <p class="text-[8px] font-bold text-gray-400 uppercase mt-1">${o.time}</p>
                    </div>
                    <span class="text-orange-600 font-black text-sm">+${parseInt(o.total || 0).toLocaleString()}</span>
                </div>`).join('');
        }

        window.onload = () => {
            renderTables();
            renderMenu();
            syncData();
            setInterval(syncData, 30000); // Tự động cập nhật mỗi 30 giây
        };
    </script>
</body>
</html>
