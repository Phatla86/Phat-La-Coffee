<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÁT LA PREMIUM - V28</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .active-tab { color: #f97316 !important; border-bottom: 3px solid #f97316; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media (min-width: 1024px) {
            #tab-pos { display: grid !important; grid-template-columns: 1fr 400px; position: static; height: calc(100vh - 64px); }
        }
    </style>
</head>
<body class="h-screen flex flex-col text-gray-800">

    <script>
        // ĐÃ CẬP NHẬT LINK APPS SCRIPT MỚI CỦA PHÁT
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxj7f7bG5Nq9YAjFjBy9kQE4wOW37oQPw4o021K1Axsjq3izYb9wF0Bd0VENcqCdDi-/exec";
        const BANK_ID = "VCB"; 
        const ACCOUNT_NO = "1046778674";
    </script>

    <header class="bg-white px-6 py-4 flex justify-between items-center border-b shrink-0 z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">PL</div>
            <div>
                <h1 class="text-xs lg:text-sm font-black uppercase tracking-tighter">Phát La Premium</h1>
                <p class="text-[8px] font-bold text-orange-500 uppercase tracking-widest">Coffee System</p>
            </div>
        </div>
        <div id="syncStatus" class="flex items-center gap-2 text-[10px] font-black uppercase text-green-500 bg-green-50 px-3 py-1 rounded-full">
            <i class="fa-solid fa-circle-check"></i> Đã kết nối Sheet
        </div>
    </header>

    <nav class="bg-white flex border-b shrink-0 lg:px-20">
        <button onclick="showTab('tables')" id="btn-tables" class="flex-1 py-4 text-[10px] font-bold uppercase active-tab tracking-widest">Sơ đồ bàn</button>
        <button onclick="showTab('pos')" id="btn-pos" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400 tracking-widest">Gọi món</button>
        <button onclick="showTab('report')" id="btn-report" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400 tracking-widest">Doanh thu</button>
    </nav>

    <main class="flex-1 relative overflow-hidden flex flex-col bg-gray-50/50">
        
        <section id="tab-tables" class="absolute inset-0 p-6 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <button onclick="selectTakeaway()" class="w-full mb-6 py-5 bg-orange-600 text-white rounded-2xl font-black text-xs uppercase shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i class="fa-solid fa-bag-shopping"></i> ĐƠN MANG VỀ
                </button>
                <div class="grid grid-cols-3 md:grid-cols-6 gap-4" id="tableGrid"></div>
            </div>
        </section>

        <section id="tab-pos" class="absolute inset-0 flex flex-col lg:flex-row hidden bg-white">
            <div class="flex-1 flex flex-col bg-gray-50/50 border-r overflow-hidden">
                <div id="catBar" class="p-4 flex gap-2 overflow-x-auto no-scrollbar shrink-0"></div>
                <div class="flex-1 overflow-y-auto p-4">
                    <div id="menuGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </div>
            </div>
            
            <div class="w-full lg:w-[400px] bg-white flex flex-col border-t lg:border-t-0 shadow-2xl lg:shadow-none">
                <div class="p-6 border-b flex justify-between items-center bg-gray-50/30">
                    <span id="labelTable" class="bg-black text-white px-3 py-1 rounded text-[9px] font-black uppercase tracking-widest">BÀN</span>
                    <span id="cartTotal" class="text-3xl font-black text-orange-600 tracking-tighter">0đ</span>
                </div>
                <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-3">
                    </div>
                <div class="p-6 border-t space-y-3">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button onclick="alert('Đã báo pha chế!')" class="py-3 bg-blue-50 text-blue-600 rounded-xl font-bold text-[9px] uppercase border border-blue-100">Báo bếp</button>
                        <button onclick="window.print()" class="py-3 bg-gray-50 text-gray-500 rounded-xl font-bold text-[9px] uppercase border border-gray-100">In Tạm tính</button>
                    </div>
                    <button onclick="generateQR()" class="w-full py-4 bg-orange-600 text-white rounded-2xl font-black text-[11px] uppercase shadow-lg shadow-orange-100">Thanh toán QR</button>
                    <button onclick="processPayment('Tiền mặt')" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-black text-[11px] uppercase">Tiền mặt</button>
                </div>
            </div>
        </section>

        <section id="tab-report" class="absolute inset-0 p-6 hidden bg-white overflow-y-auto">
            <div class="max-w-3xl mx-auto space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-6 rounded-[2.5rem] text-center border-2 border-orange-50 shadow-sm">
                        <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Hôm nay</p>
                        <h3 id="statDay" class="text-xl font-black text-orange-600">0đ</h3>
                    </div>
                    <div class="bg-gray-900 p-6 rounded-[2.5rem] text-center text-white shadow-xl">
                        <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Tháng này</p>
                        <h3 id="statMonth" class="text-xl font-black text-white">0đ</h3>
                    </div>
                    <div class="bg-white p-6 rounded-[2.5rem] text-center border-2 border-gray-100 shadow-sm">
                        <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Năm 2026</p>
                        <h3 id="statYear" class="text-xl font-black text-gray-900">0đ</h3>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-center px-2">
                        <h2 class="text-xs font-black uppercase tracking-widest">Lịch sử giao dịch</h2>
                        <button onclick="clearHistory()" class="text-[8px] font-bold text-red-400 uppercase">Xóa dữ liệu</button>
                    </div>
                    <div id="orderHistory" class="space-y-3 pb-20"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden p-6 z-[300]">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 text-center">
            <img id="qrImage" src="" class="w-64 h-64 mx-auto border-8 border-gray-50 rounded-[2.5rem] mb-6 shadow-sm">
            <p id="qrAmount" class="text-3xl font-black text-orange-600 mb-2">0đ</p>
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-8">VCB - 1046778674</p>
            <button onclick="processPayment('Chuyển khoản')" class="w-full py-5 bg-green-600 text-white rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-xl shadow-green-100">Đã nhận được tiền</button>
            <button onclick="closeQR()" class="mt-4 text-gray-300 text-[10px] font-black uppercase">Bỏ qua</button>
        </div>
    </div>

    <script>
        const menu = [
            { cat: "CÀ PHÊ", name: "Cà Phê Đen", price: 35000, icon: "fa-mug-hot" },
            { cat: "CÀ PHÊ", name: "Cà Phê Sữa", price: 40000, icon: "fa-glass-water" },
            { cat: "CÀ PHÊ", name: "Bạc Xỉu", price: 45000, icon: "fa-glass-water" },
            { cat: "TRÀ", name: "Trà Đào Cam Sả", price: 55000, icon: "fa-leaf" },
            { cat: "TRÀ", name: "Trà Vải", price: 55000, icon: "fa-leaf" },
            { cat: "ĐÁ XAY", name: "Matcha Đá Xay", price: 65000, icon: "fa-ice-cream" },
            { cat: "SIGNATURE", name: "Phát La Special", price: 85000, icon: "fa-crown" }
        ];

        let tables = JSON.parse(localStorage.getItem('pl_v28_tables')) || Array.from({length: 12}, (_, i) => ({ id: i+1, status: 'available', cart: [] }));
        let orders = JSON.parse(localStorage.getItem('pl_v28_orders')) || [];
        let curTable = null, activeCart = [], isTakeaway = false, curCat = "TẤT CẢ";

        function showTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active-tab');
            if(t==='tables') renderTables();
            if(t==='report') renderStats();
        }

        function renderTables() {
            document.getElementById('tableGrid').innerHTML = tables.map(t => `
                <div onclick="selectTable(${t.id})" class="p-6 rounded-[2.2rem] border-2 transition-all flex flex-col items-center gap-1 cursor-pointer ${t.status==='available'?'bg-white border-gray-100':'bg-black text-white border-black shadow-lg'}">
                    <b class="text-xs font-black">${t.id}</b>
                    <span class="text-[7px] font-bold opacity-40 uppercase">${t.status==='available'?'Trống':'Đang ngồi'}</span>
                </div>
            `).join('');
        }

        function selectTable(id) {
            curTable = id; isTakeaway = false;
            document.getElementById('labelTable').innerText = `BÀN ${id}`;
            activeCart = [...tables.find(t => t.id === id).cart];
            updateCartUI(); showTab('pos');
        }

        function selectTakeaway() {
            curTable = null; isTakeaway = true; activeCart = [];
            document.getElementById('labelTable').innerText = `MANG VỀ`;
            updateCartUI(); showTab('pos');
        }

        function renderCats() {
            const cats = ["TẤT CẢ", ...new Set(menu.map(m => m.cat))];
            document.getElementById('catBar').innerHTML = cats.map(c => `
                <button onclick="setCat('${c}')" class="px-5 py-2 rounded-full border-2 text-[10px] font-black shrink-0 transition-all ${curCat===c?'bg-orange-600 border-orange-600 text-white':'bg-white text-gray-400 border-gray-100'}">${c}</button>
            `).join('');
        }

        function setCat(c) { curCat = c; renderCats(); renderMenu(); }

        function renderMenu() {
            const list = curCat === "TẤT CẢ" ? menu : menu.filter(m => m.cat === curCat);
            document.getElementById('menuGrid').innerHTML = list.map(m => `
                <div onclick="addToCart('${m.name}', ${m.price})" class="bg-white p-5 rounded-[2.5rem] border-2 border-gray-50 shadow-sm transition-all active:scale-95 flex flex-col justify-between h-40 cursor-pointer hover:border-orange-200">
                    <div class="text-orange-500"><i class="fa-solid ${m.icon}"></i></div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-gray-900 leading-tight">${m.name}</p>
                        <p class="text-[11px] font-bold text-gray-300 mt-1">${m.price.toLocaleString()}đ</p>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            activeCart.push({name, price}); updateCartUI();
            if(!isTakeaway) {
                const t = tables.find(x => x.id === curTable);
                t.status = 'occupied'; t.cart = activeCart;
                localStorage.setItem('pl_v28_tables', JSON.stringify(tables));
            }
        }

        function updateCartUI() {
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            document.getElementById('cartTotal').innerText = total.toLocaleString() + 'đ';
            const cartDiv = document.getElementById('cartItems');
            if(activeCart.length === 0) {
                cartDiv.innerHTML = `<div class="text-center py-20 text-gray-200 uppercase font-black text-[10px] tracking-widest"><i class="fa-solid fa-mug-hot text-4xl mb-4 block"></i>Chưa có món</div>`;
            } else {
                cartDiv.innerHTML = activeCart.map((item, idx) => `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <span class="text-[10px] font-black uppercase">${item.name}</span>
                        <button onclick="removeItem(${idx})" class="text-red-400"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                `).join('');
            }
        }

        function removeItem(idx) {
            activeCart.splice(idx, 1); updateCartUI();
            if(!isTakeaway) {
                const t = tables.find(x => x.id === curTable);
                t.cart = activeCart;
                if(activeCart.length === 0) t.status = 'available';
                localStorage.setItem('pl_v28_tables', JSON.stringify(tables));
            }
        }

        function generateQR() {
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            if(total <= 0) return;
            const desc = encodeURIComponent(`PL PREMIUM BAN ${curTable || 'MV'}`);
            document.getElementById('qrImage').src = `https://img.vietqr.io/image/${BANK_ID}-${ACCOUNT_NO}-compact2.png?amount=${total}&addInfo=${desc}`;
            document.getElementById('qrAmount').innerText = total.toLocaleString() + 'đ';
            document.getElementById('qrModal').classList.remove('hidden');
        }

        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }

        async function processPayment(method) {
            if(!activeCart.length) return;
            const total = activeCart.reduce((s,c)=>s+c.price, 0);
            const now = new Date();
            const data = { 
                date: now.toLocaleDateString('vi-VN'),
                time: now.toLocaleTimeString('vi-VN'), 
                table: isTakeaway ? 'Mang về' : `Bàn ${curTable}`, 
                total: total, 
                method: method,
                month: (now.getMonth() + 1) + "/" + now.getFullYear(),
                year: now.getFullYear().toString()
            };

            const statusEl = document.getElementById('syncStatus');
            statusEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xuất Sheet...';

            try {
                // Đẩy lên Google Sheet qua link mới của Phát
                await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                
                orders.unshift(data);
                localStorage.setItem('pl_v28_orders', JSON.stringify(orders));
                if(!isTakeaway) {
                    const t = tables.find(x => x.id === curTable);
                    t.status = 'available'; t.cart = [];
                    localStorage.setItem('pl_v28_tables', JSON.stringify(tables));
                }
                statusEl.innerHTML = '<i class="fa-solid fa-circle-check"></i> Đã đồng bộ';
                closeQR(); activeCart = []; updateCartUI(); showTab('tables');
            } catch (e) { 
                alert("Lỗi kết nối. Vui lòng kiểm tra Apps Script!"); 
                statusEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-500"></i> Lỗi kết nối';
            }
        }

        function renderStats() {
            const now = new Date();
            const todayStr = now.toLocaleDateString('vi-VN');
            const monthStr = (now.getMonth() + 1) + "/" + now.getFullYear();
            const yearStr = now.getFullYear().toString();

            const dayTotal = orders.filter(o => o.date === todayStr).reduce((s,o)=>s+o.total, 0);
            const monthTotal = orders.filter(o => o.month === monthStr).reduce((s,o)=>s+o.total, 0);
            const yearTotal = orders.filter(o => o.year === yearStr).reduce((s,o)=>s+o.total, 0);

            document.getElementById('statDay').innerText = dayTotal.toLocaleString() + 'đ';
            document.getElementById('statMonth').innerText = monthTotal.toLocaleString() + 'đ';
            document.getElementById('statYear').innerText = yearTotal.toLocaleString() + 'đ';

            document.getElementById('orderHistory').innerHTML = orders.slice(0, 30).map(o => `
                <div class="flex justify-between p-5 bg-gray-50 rounded-[2rem] border-2 border-white shadow-sm">
                    <div>
                        <p class="text-[10px] font-black uppercase text-gray-800">${o.table}</p>
                        <p class="text-[8px] font-bold text-gray-400 mt-1">${o.date} ${o.time} - ${o.method}</p>
                    </div>
                    <b class="text-orange-600 self-center text-sm">+${o.total.toLocaleString()}</b>
                </div>
            `).join('');
        }

        function clearHistory() {
            if(confirm("Xóa lịch sử doanh thu trên App? (Dữ liệu trên Google Sheet vẫn giữ nguyên)")) {
                orders = [];
                localStorage.setItem('pl_v28_orders', JSON.stringify(orders));
                renderStats();
            }
        }

        window.onload = () => { renderCats(); renderMenu(); showTab('tables'); };
    </script>
</body>
</html>
